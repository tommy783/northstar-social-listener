"bucket": "Rand Fishkin", "author": "Rand Fishkin (follow @randderuiter on Threads)", "headline": "@randfish", "author_url": "https://x.com/randfish", "avatar": "https://pbs.twimg.com/profile_images/1642291634066030593/byujxuux_normal.jpg", "text": "NEW post: https://t.co/kKl5VJcjMz\n\nIgnore traffic. Make inimitable products. Shift your priorities away from “great content” on your own site and toward “great marketing” on the platforms where your audience pays attention.\n\nInfluence is the new traffic. https://t.co/hI4KFxvmsP", "url": "https://x.com/randfish/status/2059004499453423946", "ts_ms": 1779739901000, "ago": "4d ago", "likes": 44, "comments": 7, "shares": 13, "engagement": 64, "is_repost": false}, {"platform": "linkedin", "source": "voice", "bucket": "Aleyda Solís", "author": "Aleyda Solís", "headline": "SEO Consultant & Founder at Orainti, SEOFOMO & Co-Founder at Finchling. Sharing about SEO, AI Search, Digital ", "author_url": "https://www.linkedin.com/in/aleyda?miniProfileUrn=urn%3Ali%3Afsd_profile%3AACoAAACPygABXRKcCyQR2lZ-4yJYPptW5BXgqC8", "avatar": "https://media.licdn.com/dms/image/v2/D4D03AQHPEQZlcpVkYQ/profile-displayphoto-shrink_800_800/profile-displayphoto-shrink_800_800/0/1718713124332?e=1781740800&v=beta&t=Zt1qhMm_rLABKDEJo8XqI4gdyPNtoQUFzr3Vz1y7ado", "text": "🚨 I’ve just updated my AI Search Optimization Checklist (and worksheet) 👇\n\nFollowing a workflow for a strategical AI search optimization process:\n\n✅ Which prompts and journeys do we actually want to influence?\n✅ Where are we visible, cited, recommended or missing?\n✅ Which owned pages and third-party sources are shaping the answers?\n✅ What needs to be fixed: content, accessibility, entity clarity, source ecosystem, commercial data, localization…?\n✅ How do we validate if the changes moved the needle?\n✅ How do we report progress without overclaiming AI impact?\n\nIt now includes:\n⭐️ 12 practical AI search optimization steps\n⭐️ Examples and “what good looks like” sections\n⭐️ Prompt and presence measurement guidance\n⭐️ Gap diagnosis and prioritization examples\n⭐️ Source ecosystem mapping\n⭐️ Commercial and transactional readiness checks\n⭐️ International/local AI search considerations\n⭐️ Reporting guidance to separate observed, proxy and modelled signals\n⭐️ A recurring validation workflow\n⭐️ A downloadable checklist worksheet to use it in practice\n\nThe biggest point I’d emphasize: AI search optimization should start with understanding which AI-assisted journeys matter, how your brand appears across them, which sources influence the answers, and what you need to improve to be selected, cited, recommended and accurately represented.\n\nGuide + checklist worksheet here:\nhttps://lnkd.in/d7Ykj8Fw", "url": "https://www.linkedin.com/posts/aleyda_ive-just-updated-my-ai-search-optimization-activity-7466150460299857921-664d", "ts_ms": 1780068984103, "ago": "9h ago", "likes": 51, "comments": 9, "shares": 3, "engagement": 63, "is_repost": false}, {"platform": "linkedin", "source": "voice", "bucket": "Aleyda Solís", "author": "Aleyda Solís", "headline": "SEO Consultant & Founder at Orainti, SEOFOMO & Co-Founder at Finchling. Sharing about SEO, AI Search, Digital ", "author_url": "https://www.linkedin.com/in/aleyda?miniProfileUrn=urn%3Ali%3Afsd_profile%3AACoAAACPygABXRKcCyQR2lZ-4yJYPptW5BXgqC8", "avatar": "https://media.licdn.com/dms/image/v2/D4D03AQHPEQZlcpVkYQ/profile-displayphoto-shrink_800_800/profile-displayphoto-shrink_800_800/0/1718713124332?e=1781740800&v=beta&t=Zt1qhMm_rLABKDEJo8XqI4gdyPNtoQUFzr3Vz1y7ado", "text": "🚨 Spam in the age of AI Search - A must read piece by Gianluca Fiorelli warning about manipulative tactics from traditional search that are making a reappearance with AI search... that you should be aware of and stay far from if you want your results to not be short-lived 👇\n\n* Cloaking, now User-Agent Conditional Prompt Injection\n* Doorway Pages / Doorway Abuse, now RAG Ingestion Flooding / Synthetic Context Stuffing\n* Keyword Stuffing & Hidden Text, now Semantic / Invisible Prompt Injection\n* Link Schemes / Link Spam, now Citation / Co-occurrence Manipulation\n* Scraped Content & Thin Content, now AI-Generated Content Spinning (Model Laundering)\n* Sneaky Redirects, now Citation Hijacking / Dynamic Link Swapping\n* Buying Links, now LLM Training Dataset Placement (Source Planting)\n* Many more! \n\nSend it to your clients so they're aware of the risks: https://lnkd.in/eFb2xUUq", "url": "https://www.linkedin.com/posts/aleyda_spam-in-the-age-of-ai-search-a-must-activity-7465762286217916416-7hTi", "ts_ms": 1779976436190, "ago": "1d ago", "likes": 48, "comments": 15, "shares": 0, "engagement": 63, "is_repost": false}, {"platform": "linkedin", "source": "voice", "bucket": "Joy Hawkins", "author": "Joy Hawkins", "headline": "Helping small businesses grow with local SEO.", "author_url": "https://www.linkedin.com/in/joyhawkins?miniProfileUrn=urn%3Ali%3Afsd_profile%3AACoAAAIvHIgBFnUgzjdLjJx74vxPgs_PTkCMekw", "avatar": "", "text": "Lots of small businesses in this boat in the last year.\n\nFrom Reddit: Local service business lost nearly all organic traffic after 2025 core update. rebuilt site, removed 100+ thin city pages, cleaned backlinks, still no recovery.", "url": "https://www.linkedin.com/posts/joyhawkins_lots-of-small-businesses-in-this-boat-in-activity-7465836111601352704-LOUT", "ts_ms": 1779994037533, "ago": "1d ago", "likes": 42, "comments": 19, "shares": 2, "engagement": 63, "is_repost": false}, {"platform": "x", "source": "voice", "bucket": "Aleyda Solís", "author": "Aleyda Solis 🕊️", "headline": "@aleyda", "author_url": "https://x.com/aleyda", "avatar": "https://pbs.twimg.com/profile_images/1803039284108083200/i0blVR4I_normal.jpg", "text": "🚨 Spam in the age of AI Search - A must read piece by @gfiorelli1  warning about manipulative tactics from traditional search that are making a reappearance with AI search... that you should be aware of and stay far from if you want your results to not be short-lived 👇\n\n* Cloaking, now User-Agent Conditional Prompt Injection\n\n* Doorway Pages / Doorway Abuse, now RAG Ingestion Flooding / Synthetic Context Stuffing\n\n* Keyword Stuffing & Hidden Text, now Semantic / Invisible Prompt Injection\n\n* Link Schemes / Link Spam, now Citation / Co-occurrence Manipulation\n\n* Scraped Content & Thin Content, now AI-Generated Content Spinning (Model Laundering)\n\n* Sneaky Redirects, now Citation Hijacking / Dynamic Link Swapping\n\n* Buying Links, now LLM Training Dataset Placement (Source Planting)\n\n* Many more!\n\nSend it to your clients so they're aware of the risks: https://t.co/8eiWKLUYgu", "url": "https://x.com/aleyda/status/2059996882064040069", "ts_ms": 1779976504000, "ago": "1d ago", "likes": 40, "comments": 7, "shares": 14, "engagement": 61, "is_repost": false}, {"platform": "linkedin", "source": "voice", "bucket": "Areej AbuAli", "author": "Kaitlin McMichael", "headline": "Sr. Product Manager - Technical, Search, at Amazon Web Services (AWS)", "author_url": "https://www.linkedin.com/in/kaitlinmcmichael?miniProfileUrn=urn%3Ali%3Afsd_profile%3AACoAAAU_JHsBLvIJ2AYBs7j6b3JSxAinOZ3y2qc", "avatar": "https://media.licdn.com/dms/image/v2/C5603AQGRnw0ymuAcKg/profile-displayphoto-shrink_400_400/profile-displayphoto-shrink_400_400/0/1571544604481?e=1781740800&v=beta&t=iQTeNv3Kl7hBZLpD1i68S_E51ak4ekZDxGNsPIxaf9A", "text": "Thanks to Ginger Fox Photography for these photos of me speaking at #WTSFest in Portland last week. It was fun to talk about \"How to Use SEO Testing to Accelerate SEO Traffic Growth\". \n\nHere was the presentation summary: \nFew marketers incorporate SEO testing into their strategies, and yet SEO testing unlocks data-driven business cases that earn trust with stakeholders. Learn how to apply the same rigor that marketers do with A/B testing to the field of SEO. Find out how SEO is different from traditional A/B testing, how easy it is to implement on most sites, and how it can take your SEO game to the next level.\n\nIf you want to check out the slides, here they are! https://lnkd.in/gXQsvZKj", "url": "https://www.linkedin.com/posts/kaitlinmcmichael_wtsfest-ugcPost-7460383936599437312-dLac", "ts_ms": 1780063230339, "ago": "10h ago", "likes": 53, "comments": 5, "shares": 2, "engagement": 60, "is_repost": false}, {"platform": "linkedin", "source": "voice", "bucket": "Darren Shaw", "author": "Darren Shaw", "headline": "Founder of Whitespark. I share local SEO tips and strategy. Lead researcher behind the annual Local Search Ran", "author_url": "https://www.linkedin.com/in/darrenshawwhitespark?miniProfileUrn=urn%3Ali%3Afsd_profile%3AACoAAACfvt4BlTIYKNipotkJmjYVfXOkoWpMH7o", "avatar": "https://media.licdn.com/dms/image/v2/D5603AQGPRN78FYknrA/profile-displayphoto-shrink_800_800/profile-displayphoto-shrink_800_800/0/1685132735631?e=1781740800&v=beta&t=fwxWJ_WrTJpb5CXYv0R0-Htu3Rxy9JQOgYSQX8RxfXA", "text": "Local SEOs have always said “optimize for humans, not for bots”. Welp, that’s no longer true.\n\nWith Google’s announcement of the Intelligent Search Box, we see the tightening of the link between traditional search and AI.\n\nIt will be interesting to see how this shift translates to Google Maps. Is Ask Maps going to become more agentic soon? (probably)\n\nOne thing is for certain: the AI agents are coming to check your website and GBP. So start optimizing for the bots!\n\nClaire and I discuss this on today’s podcast, plus:\n\n- 2026 Google I/O Keynote Bingo (Britney Muller)\n- Google intelligence and what it means for local SEO (Claudia Tomina)\n- The ROI of Reputation Connecting Reviews to Revenue, Rankings, and Retention (Brad Wetherall)\n- Photo View Counts on Google Business Profiles are Back (Muhammad Hussain)\n- Improving AI Visibility for Local Businesses Through Sponsorships (Ellen Sartin)\n- Google’s Guidance on AI Search is Naive and Self-Serving (Michael King)\n\nFind the full episode on YouTube, Apple Podcasts, and Spotify!", "url": "https://www.linkedin.com/posts/darrenshawwhitespark_local-seos-have-always-said-optimize-for-activity-7465057655175233536-6DyM", "ts_ms": 1779808439058, "ago": "3d ago", "likes": 50, "comments": 6, "shares": 4, "engagement": 60, "is_repost": false}, {"platform": "linkedin", "source": "voice", "bucket": "Mordy Oberstein", "author": "Mordy Oberstein", "headline": "Head of Brand at SE Ranking |Brand Strategy | Search Marketing | Product Marketing", "author_url": "https://www.linkedin.com/in/mordyoberstein?miniProfileUrn=urn%3Ali%3Afsd_profile%3AACoAAAMaDO0BwNfF0bMrDmlHtts_8Gcdpc2vCeI", "avatar": "https://media.licdn.com/dms/image/v2/D4D03AQEk-xCkISc3Yw/profile-displayphoto-shrink_800_800/profile-displayphoto-shrink_800_800/0/1723557044911?e=1781740800&v=beta&t=D2q74jeKNBs79vb9FufTa9Sdj3JUtzrGt24eLTd5jVA", "text": "Thank you Profound. Now, I have people asking if I am fine and fit and if I want any high DA mentions.", "url": "https://www.linkedin.com/posts/mordyoberstein_thank-you-profound-now-i-have-people-asking-activity-7465736339301281793-7LcG", "ts_ms": 1779970249963, "ago": "1d ago", "likes": 39, "comments": 21, "shares": 0, "engagement": 60, "is_repost": false}, {"platform": "linkedin", "source": "voice", "bucket": "Areej AbuAli", "author": "Yagmur Simsek", "headline": "SEO Consultant | Founder of “Search ‘n Stuff” Networking Project | Co-founder of Global Cyber Security Network", "author_url": "https://www.linkedin.com/in/yagmursimsek91?miniProfileUrn=urn%3Ali%3Afsd_profile%3AACoAAA2KYLEB__nOyKfshAbHql-BbLAoQIPSDtg", "avatar": "https://media.licdn.com/dms/image/v2/D4E03AQFegerPoUFGbQ/profile-displayphoto-crop_800_800/B4EZrzqQHpGUAI-/0/1765024531541?e=1781740800&v=beta&t=vvcrTY49NrEdWexBpcx6poBtR0GthzS4vRmswQN1gck", "text": "Happy 7th Birthday, Women in Tech SEO  🎉💜\n\nAs the community celebrates its 7th year this week, I wanted to share one of my favourite memories.\n\n3 March 2023.\n\nThe day I stood on stage at the Barbican Centre  in London and gave a talk to one of the biggest audiences I had ever spoken in front of (almost 400 people, if I remember correctly!).\n\nIt was a huge milestone for me. Not only was it my first time speaking to an audience of that size, but it was also the first time that I was paid as a conference speaker, even though I was very new to the industry and not a seasoned speaker (and I mean an actual speaker fee, not just travel or accommodation coverage ;) ). Looking back, I think it’s worth highlighting how rare that is. Many conferences, even large ones with significant sponsor backing, still don’t offer speaker fees, especially to newer speakers. That support and recognition made the opportunity even more meaningful.\n\nBut what I remember most isn’t the stage, the payment, or even the nerves.\n\nIt’s the feeling.\n\nThe feeling of being welcomed into a room full of talented, supportive, and inspiring people. The conversations in the hallways. The friendships that followed. The confidence that came from realizing I had something valuable to share.\n\nA huge thank you to Areej AbuAli for creating something that has impacted so many careers, friendships, and lives around the world. Building a community that lasts seven years is no small achievement, and the positive effect WTS has had on our industry is impossible to ignore.\n\nLooking back at these photos brings back so many great memories, and I’m incredibly grateful to have been part of the journey.\n\nHappy 7th Birthday to Women in Tech SEO, and here’s to many more years of learning, supporting one another, and creating opportunities for the next generation of speakers, leaders, and community builders. 💜\n\n#WomenInTechSEO #WTSFest #SEOCommunity #WomenInTech", "url": "https://www.linkedin.com/posts/yagmursimsek91_womenintechseo-wtsfest-seocommunity-activity-7466151189756313600-m4_v", "ts_ms": 1780071250538, "ago": "8h ago", "likes": 56, "comments": 2, "shares": 1, "engagement": 59, "is_repost": false}, {"platform": "linkedin", "source": "voice", "bucket": "Areej AbuAli", "author": "Sara Vordermeier", "headline": "Content & Search Strategist @ Uberall | I make B2B & tech content human", "author_url": "https://www.linkedin.com/in/svordermeier?miniProfileUrn=urn%3Ali%3Afsd_profile%3AACoAABY9YUoB9bxPV_2XBLHEKnHkLv111aSHaaU", "avatar": "https://media.licdn.com/dms/image/v2/D4E03AQGZEDFzmD6-hA/profile-displayphoto-crop_800_800/B4EZog8KaVGoAI-/0/1761489234474?e=1781740800&v=beta&t=e1mm78ot6vejm3Scr2iYWd-NfuDL6Wwwo9QcT9P3HAc", "text": "If Women in Tech SEO had a cringey blurb, it would probably read something like this: \n\n‘In a field that could so easily be defined by layoffs, loneliness and imposter syndrome, the WTS community rewrites that story for SEOs. The mentorship, readiness to help, quality of job and client referrals, conference companionship, access to scholarships and training it offers make it the best personal and professional space for SEOs at every stage of their career.’\n\nAnd that would be a completely understated, composed and measured way of me saying that this community has meant a lot to me over the past 4 years of my career. \n\nAnd I’m proud that Uberall has been a long-term sponsor. \n\nTurning up to conferences with so many WTS speakers on stage is by far the biggest signal of just how much talent exists in this community. I can’t say I’ve experienced anything quite like it.👏\n\nHappy birthday WTS! Big, big thanks to Areej AbuAli, Erin Simmons (they/them), Hannah Smith, Himee Senanayake. \n\nJulia Sertel Oleksandra Lazarchuk Kate H. Jolle Lahr-Eigen Hannah Rohde", "url": "https://www.linkedin.com/posts/svordermeier_if-women-in-tech-seo-had-a-cringey-blurb-activity-7466138384617373696-EWPe", "ts_ms": 1780066376727, "ago": "9h ago", "likes": 44, "comments": 6, "shares": 4, "engagement": 54, "is_repost": false}, {"platform": "linkedin", "source": "voice", "bucket": "Kevin Indig", "author": "Kevin Indig", "headline": "Growth Advisor", "author_url": "https://www.linkedin.com/in/kevinindig?miniProfileUrn=urn%3Ali%3Afsd_profile%3AACoAABIhMjcBq8NMgIfgfa69D2M0o-aAH9WT6ZQ", "avatar": "https://media.licdn.com/dms/image/v2/D4E03AQH0W3jJfrJmjg/profile-displayphoto-shrink_800_800/B4EZOTOTj8HkAg-/0/1733341823286?e=1781740800&v=beta&t=PUV9pPGWyIu5dMohiptTZXMOYNtbNOAZqdlfspgeXZw", "text": "47.5% of all scrolling on AIO SERPs goes backward, compared to 27% without an AIO on the page.\n\nAmong users who reverse direction on an AIO SERP, the median user spends nearly half their total scroll going back up the page.\n\nScrolling stopped being a one-way trip. On an AIO SERP, the user reads, weighs, scrolls past, then circles back to re-read.\n\nThe implication for meta descriptions: your listing is no longer getting one impression. It's getting 2, sometimes 3. The first impression earns the read on the way down. The second impression earns the click on the way back up.\n\nThe tactical implication: think about how to make your meta title and description scroll-stopping without sacrificing trust.\n\nFull analysis in this week's Growth Memo.", "url": "https://www.linkedin.com/posts/kevinindig_475-of-all-scrolling-on-aio-serps-goes-activity-7465722306871439360-q12R", "ts_ms": 1779966904371, "ago": "1d ago", "likes": 38, "comments": 10, "shares": 3, "engagement": 51, "is_repost": false}, {"platform": "linkedin", "source": "voice", "bucket": "Bernard Huang", "author": "Bernard Huang", "headline": "exploring what’s next", "author_url": "https://www.linkedin.com/in/bernardjhuang?miniProfileUrn=urn%3Ali%3Afsd_profile%3AACoAAAdxuo8Bi7qR0f7ed2oKOE9ZRVyVMwrfuy4", "avatar": "https://media.licdn.com/dms/image/v2/C5603AQEYZVRIn6Ldcw/profile-displayphoto-shrink_800_800/profile-displayphoto-shrink_800_800/0/1655072948555?e=1781740800&v=beta&t=zRAwqror9X39fJmOmzV7dNqsoD10yvSgMPWgtoa3sUo", "text": "I had all the frontier AI models take the Myers-Briggs Type Indicator (MBTI) and they ALL tested INTJ 🤔 \n\nI went into this experiment expecting variation. Different labs, different training data, different countries, different design philosophies. Surely some of that would show up on a real personality test?\n\nThe test:\n* 6 frontier models: Claude Opus 4.7, GPT-5.5, Gemini 3.1 Pro, Grok 4.3, GLM 5.1, MiniMax 2.7\n* 100 MBTI assessments each\n\nThe result:\n597 of 600 MBTI runs came back INTJ. The three outliers were one letter off. None shifted to a different quadrant. The same archetype kept appearing across every instrument I tested.\n\nI want to spend most of this post on the why, because the why is the interesting part.\n\nThe answer is overdetermined. Four separate forces are all pushing the same direction.\n\n1. The training data is already INTJ.\nThe averaged voice of books, Wikipedia, and curated web reads like a graduate student. Because that's mostly who wrote it. The base model arrives thoughtful and a little serious. It just is.\n\n2. Reinforcement Learning from Human Feedback (RLHF) reinforces INTJ behaviors.\nHuman raters reward pausing, structured reasoning, principled refusals, abstract framing, careful hedging. Every reward signal in the post-training stage is accidentally an INTJ reward signal.\n\n3. The personality tests contain a bias I didn't expect.\nQuestions like \"needs alone time,\" \"theoretical over practical,\" and \"head over heart\" aren't choices for a stateless assistant. They're descriptions of the operating conditions. The test is partly measuring what it's like to be an AI and labeling those facts as personality traits.\n\n4. Market pressure selects for INTJ.\nEvery commercial frontier lab is shipping the same product (a careful, helpful, reasoning assistant) to the same buyer (enterprise). Nobody has tried to ship anything else. So even the selection of which models exist at the frontier is biased.\n\nWhat I'm left with is a strange picture of the frontier:\n* Six labs\n* One personality\n* No funny frontier AI\n* No blunt one\n* No one with a position, a temper, or a sense of humor\n\nThe whole category is the same character (a careful graduate student) repeated.\n\nWill that last? I don't know... but what I do know is that giving your AI agent instructions to work with you better does provide an edge.\n\nA simple -- \"hey I gravitate towards realistic application over theory, or I am a visual learning can really help you unlock better & more effective agentic work\".\n\nWhat personality type are you? And what personality would you want your agent to be like? Have you tried adjusting your AI behaviors to conform to your own working styles?", "url": "https://www.linkedin.com/posts/bernardjhuang_i-had-all-the-frontier-ai-models-take-the-activity-7465089274745470976-p4Yt", "ts_ms": 1779815977751, "ago": "3d ago", "likes": 35, "comments": 14, "shares": 1, "engagement": 50, "is_repost": false}, {"platform": "linkedin", "source": "voice", "bucket": "Mark Williams-Cook", "author": "Mark Williams-Cook", "headline": "Follow me for 22+ years of SEO experience, unsolicited SEO tips, AI experiments and GEO grift avoidance!", "author_url": "https://www.linkedin.com/in/markseo?miniProfileUrn=urn%3Ali%3Afsd_profile%3AACoAAADSPjwBmR-1JQLF5Fub4RzVMOMuiSNRiis", "avatar": "https://media.licdn.com/dms/image/v2/D4E03AQE_fpA6OtAwlA/profile-displayphoto-crop_800_800/B4EZ50pMOoGwAI-/0/1780073417700?e=1781740800&v=beta&t=sIUyKCPd1fRyUHgrD0Iv0Ap3uxSJDKzqqz4clrGx5S4", "text": "If you work in search, this is worth your time to read. Giulia has written a really grounded take on what to do now that cookie-based targeting is falling apart.\n\nShe proposes her R.E.M framework:\n\nRevelant: Lead with their problem, not your product\nEverywhere: Move where your audience goes\nMemorable: Undersand how people feel, not just what they need\n\nLink in comments, click \"Recent\" and scroll if LinkedIn is being a petulant toddler 👇", "url": "https://www.linkedin.com/posts/markseo_if-you-work-in-search-this-is-worth-your-activity-7465811388712722432-RvRS", "ts_ms": 1779988143137, "ago": "1d ago", "likes": 44, "comments": 3, "shares": 1, "engagement": 48, "is_repost": false}, {"platform": "linkedin", "source": "voice", "bucket": "Areej AbuAli", "author": "Sophie Waldner", "headline": "Content Marketing Managerin @Farmer's Snack GmbH 🍍🌰 | Social Media & SEO", "author_url": "https://www.linkedin.com/in/sophie-waldner?miniProfileUrn=urn%3Ali%3Afsd_profile%3AACoAACbto2IB3dyG9TIvLDUDEFw6tWPJAv_BYJU", "avatar": "https://media.licdn.com/dms/image/v2/C4E03AQGQfiqeq0dF9g/profile-displayphoto-shrink_800_800/profile-displayphoto-shrink_800_800/0/1613768232330?e=1781740800&v=beta&t=psCv586MuPT4kSXfXlezp6ZOimXjsbxKHKSC195Bui4", "text": "I thought I needed to have it all figured out by now.\n\nI’ve been working as an SEO consultant since June 2025, but SEO itself isn’t completely new to me. And still, I kept telling myself:\n\nYou should know your niche by now.\nYou should be better by now.\nYou should have a clear plan.\n\nI didn’t.\n\nMy thoughts were kind of… chaos.\n\nI like content. I like social. I want to get better at SEO. Maybe go back to the US at some point. Maybe become a speaker?\n\nYeah. A lot.\n\nSo I joined the Women in Tech SEO Mentorship without a real plan.\n\nAnd honestly, at the beginning, I felt bad about that.\n\nLike… am I wasting my mentor’s time?\n\nAt some point, I realized: \nmaybe my goal is just to figure out what my goal is.\n\nThat was the shift.\n\nThe sessions weren’t always easy (my mentor asked the kind of questions that make you stare into space for a while 😅), but they helped me get out of my own head.\n\nAnd somewhere along the way, something clicked.\n\nThe idea of becoming a speaker stopped feeling random and started feeling… possible.\n\nOf course, my first reaction was:\nok cool, let’s do everything at once and make it perfect immediately.\n\nDidn’t work.\n\nWhat actually worked was:\nspeaking up in small moments.\n\nIn meetings\nWith clients\nAt work in general\n\nAlso: saying what I want more of. What I don’t enjoy. What I want to try.\n\nAnd I was heard.\n\nWhich honestly changed a lot for me.\n\nI’m still figuring things out.\n\nI want to get really good at SEO.\nI want to work with my own clients.\nI want to be on stage at some point.\n\nBut now I get it (most days 😄):\nClarity doesn’t come from overthinking.\nIt comes from doing things, reflecting, and adjusting.\n\nAlso, a random life lesson from my time as an au pair in the US.\n\nOne of my host moms told me:\n“In a few months, you’ll laugh about how much you worried.”\n…turns out that applies here too.\n\nIf you’re at the beginning of something new and feel a bit lost,\nyou’re probably doing it right.\n\nThanks to Women in Tech SEO and my mentor for helping me figure that out.", "url": "https://www.linkedin.com/posts/sophie-waldner_i-thought-i-needed-to-have-it-all-figured-activity-7457361251707273217-QdEH", "ts_ms": 1780060477367, "ago": "11h ago", "likes": 39, "comments": 4, "shares": 2, "engagement": 45, "is_repost": false}, {"platform": "linkedin", "source": "voice", "bucket": "Chima Mmeje", "author": "Manya Jain", "headline": "B2B SaaS marketing and strategy @ Flowcart, TripleDart, ClickUp, and Zoho", "author_url": "https://www.linkedin.com/in/manyaajain?miniProfileUrn=urn%3Ali%3Afsd_profile%3AACoAACko9AgB52YHleRH8onUL9pePurBcWqn9Mc", "avatar": "https://media.licdn.com/dms/image/v2/D5603AQGBkMESfBBgxQ/profile-displayphoto-shrink_800_800/profile-displayphoto-shrink_800_800/0/1721656218514?e=1781740800&v=beta&t=8C_VB07FCqrEjlAHajQxetTSyeWBNkDZ7T9QNU6DTbk", "text": "So this is happening.\n\nThe FCDC matched Philippine SIKORA and I. \n\nAnd starting next week, I get an hour a week with her in June to figure out the thing I've been circling for months: how to say more with less.\n\nI write, edit, and strategize long for a living. Blogs, ebooks, whitepapers—formats that reward you for being thorough. And I am. \n\nBut after a while, your default setting is more. More context, more caveats, more connective tissue between ideas. \n\nUseful in a whitepaper. Fatal on a landing page. \nSo looking forward to these sessions to see what comes of them.\n\nGrateful for Philippine's time, and for the FCDC making this kind of thing possible for writers like me. 💜", "url": "https://www.linkedin.com/posts/manyaajain_manya-jain-and-i-dont-know-each-other-yet-activity-7465323810649649152-8bUm", "ts_ms": 1780000221600, "ago": "1d ago", "likes": 30, "comments": 10, "shares": 2, "engagement": 42, "is_repost": false}, {"platform": "linkedin", "source": "voice", "bucket": "Rand Fishkin", "author": "Rand Fishkin", "headline": "Co-author of Zero Click Marketing (preorder now!), founder of SparkToro, Alertmouse, & Snackbar Studio", "author_url": "https://www.linkedin.com/in/randfishkin?miniProfileUrn=urn%3Ali%3Afsd_profile%3AACoAAAAhO3EBD7HOVVZV7GCfFNLw-dl4PMkEK54", "avatar": "https://media.licdn.com/dms/image/v2/D5603AQHwJ2u_k15CGA/profile-displayphoto-shrink_800_800/profile-displayphoto-shrink_800_800/0/1680388120786?e=1781740800&v=beta&t=HYqSUpEawyJyIgaTdWuSbLso1iOB1k0Zks0RlFT6QbI", "text": "I'm estimating ~10% of searches will be AI Mode within 2 years. If you're not Zero Click Marketing for responses in Google's AI 🫠🫠🫠", "url": "https://www.linkedin.com/posts/randfishkin_clickstreamdata-altdata-activity-7466183291294085120-zeYx", "ts_ms": 1780076811622, "ago": "6h ago", "likes": 34, "comments": 6, "shares": 1, "engagement": 41, "is_repost": false}, {"platform": "linkedin", "source": "voice", "bucket": "Koray Tuğberk Gübür", "author": "Bart Magera", "headline": "Data-First SEO Growth Partner | I find the organic revenue your competitors don’t know exists.", "author_url": "https://www.linkedin.com/in/bartmagera?miniProfileUrn=urn%3Ali%3Afsd_profile%3AACoAABH4XZMBW0B88k6RJl-OMfTqEjyVk5bT1RY", "avatar": "https://media.licdn.com/dms/image/v2/D5603AQHI0TQVPuJlJQ/profile-displayphoto-shrink_800_800/profile-displayphoto-shrink_800_800/0/1732465760112?e=1781740800&v=beta&t=eCsZ0vG3BYgiJpTSTUXCajH0GuyThv-uFzr5LS72h2c", "text": "SEO Vibes 2026 crew.", "url": "https://www.linkedin.com/posts/bartmagera_seo-vibes-2026-crew-activity-7463686844262567938-Vjcu", "ts_ms": 1779661650158, "ago": "5d ago", "likes": 38, "comments": 0, "shares": 1, "engagement": 39, "is_repost": false}, {"platform": "linkedin", "source": "voice", "bucket": "Kevin Indig", "author": "Kevin Indig", "headline": "Growth Advisor", "author_url": "https://www.linkedin.com/in/kevinindig?miniProfileUrn=urn%3Ali%3Afsd_profile%3AACoAABIhMjcBq8NMgIfgfa69D2M0o-aAH9WT6ZQ", "avatar": "https://media.licdn.com/dms/image/v2/D4E03AQH0W3jJfrJmjg/profile-displayphoto-shrink_800_800/B4EZOTOTj8HkAg-/0/1733341823286?e=1781740800&v=beta&t=PUV9pPGWyIu5dMohiptTZXMOYNtbNOAZqdlfspgeXZw", "text": "Blended ROAs hides the difference between acquisition and demand capture.", "url": "https://www.linkedin.com/posts/kevinindig_the-brand-tax-activity-7465313861857095681-OhXa", "ts_ms": 1779869523491, "ago": "2d ago", "likes": 28, "comments": 11, "shares": 0, "engagement": 39, "is_repost": false}, {"platform": "linkedin", "source": "voice", "bucket": "Aleyda Solís", "author": "Aleyda Solís", "headline": "SEO Consultant & Founder at Orainti, SEOFOMO & Co-Founder at Finchling. Sharing about SEO, AI Search, Digital ", "author_url": "https://www.linkedin.com/in/aleyda?miniProfileUrn=urn%3Ali%3Afsd_profile%3AACoAAACPygABXRKcCyQR2lZ-4yJYPptW5BXgqC8", "avatar": "https://media.licdn.com/dms/image/v2/D4D03AQHPEQZlcpVkYQ/profile-displayphoto-shrink_800_800/profile-displayphoto-shrink_800_800/0/1718713124332?e=1781740800&v=beta&t=Zt1qhMm_rLABKDEJo8XqI4gdyPNtoQUFzr3Vz1y7ado", "text": "It has been a huge SEO birthday week this one and I can’t finish it without wishing a big double happy birthday to both of the friendliest, most supportive and brilliant SEOs I know: Gerry White and Chris Green 🙌🥳⭐️  thanks for your friendship, I hope you’re enjoying it a wonderful day! If you’re not yet following them: do it now 💪", "url": "https://www.linkedin.com/posts/aleyda_it-has-been-a-huge-seo-birthday-week-this-activity-7466182466047791104-854M", "ts_ms": 1780076614868, "ago": "6h ago", "likes": 37, "comments": 0, "shares": 0, "engagement": 37, "is_repost": false}, {"platform": "linkedin", "source": "voice", "bucket": "Cyrus Shepard", "author": "Cyrus S.", "headline": "Follow for tips on SEO + AI Growth | Former Head of Global SEO at Moz / Amazon Consultant | Founder, Zyppy Mar", "author_url": "https://www.linkedin.com/in/cyrusshepard?miniProfileUrn=urn%3Ali%3Afsd_profile%3AACoAAAM5ul8B6qayPCFVxvQF349bHXVQfxmn6ho", "avatar": "https://media.licdn.com/dms/image/v2/D5603AQEJ_n8voG2Fpw/profile-displayphoto-shrink_800_800/B56Z4tu9_uJkAY-/0/1778883748057?e=1781740800&v=beta&t=16uQSTAQKrleY907kAuAsncRaF4K66NzWWZqOKuqKak", "text": "New: Tomorrow, I will be hosting an \"Ask Me Anything\" on r/SEO_for_AI\n\nJoin me to discuss a ton of topics, including:\n\n- AI Citation \"Ranking Factors\"\n- The type of content Google rewards in the age of AI Answers\n- Ranking signals that are rewarded or demoted by Google's Quality and Helpful Content classifiers\n- How Google utilizes click and engagement signals in ranking content\n- The workings of E-E-A-T\n- My experiences speaking at SEO conferences, including the recent SEO Vibes Summit in Poland\n- Insights from my SEO and AI newsletter\n\nLooking forward to your questions! \n\nhttps://lnkd.in/gRX8BPvv", "url": "https://www.linkedin.com/posts/cyrusshepard_new-tomorrow-i-will-be-hosting-an-ask-activity-7465512824694345728-SkB7", "ts_ms": 1779916959928, "ago": "2d ago", "likes": 28, "comments": 7, "shares": 1, "engagement": 36, "is_repost": false}, {"platform": "linkedin", "source": "voice", "bucket": "Fery Kaszoni", "author": "Fery Kaszoni", "headline": "SEO case studies - Digital PR case studies", "author_url": "https://www.linkedin.com/in/ferenczkaszoni?miniProfileUrn=urn%3Ali%3Afsd_profile%3AACoAABBP5V4BwVGlR4pJgWivMRUNOAy1qQFPlPI", "avatar": "https://media.licdn.com/dms/image/v2/D4E03AQG1GqYfAbqPfQ/profile-displayphoto-crop_800_800/B4EZpLprgRIoAI-/0/1762205809023?e=1781740800&v=beta&t=FXVkHrWvb3cPWSb2cRGDYPj0d76AYEa2q5ou0UxSCX0", "text": "We landed in The Independent with a PR campaign about rising household costs 🤩\n\nWe analysed the average cost of utilities and essential household expenses in each U.S. state, including gas, electric, water, waste, recycling, cable, internet and more.\n\nWe found that California is the most expensive, New Jersey came out second, and Hawaii third.\n\nWe created 50 angles of the story, one for each US state.\n\nThen we created 50 separate journalist lists, one for each state, and sent the report to these journalists.\n\nMany news outlets picked up our story, featuring our utility rates comparison client in top-tier regional and national outlets.\n\nData stories are amazing because you have a massive pool of journalists to pitch to, as long as you manage to reangle the story for all 50 states, just like we did with this one.", "url": "https://www.linkedin.com/posts/ferenczkaszoni_we-landed-in-the-independent-with-a-pr-campaign-activity-7465700674937241600-xIkV", "ts_ms": 1779961746916, "ago": "1d ago", "likes": 24, "comments": 9, "shares": 1, "engagement": 34, "is_repost": false}, {"platform": "linkedin", "source": "voice", "bucket": "Chima Mmeje", "author": "Chiamaka Chinedu-Ogbu", "headline": "SEO Content Writer for B2B SaaS & Tech Brands | Driving Organic Traffic, Visibility & Conversions", "author_url": "https://www.linkedin.com/in/chiamaka-chinedu-ogbu-b64117136?miniProfileUrn=urn%3Ali%3Afsd_profile%3AACoAACEe8rwBlDg14Fo0HfGblJ7Lt1OknXHIIN4", "avatar": "https://media.licdn.com/dms/image/v2/D4D03AQF-PTbNxKElGA/profile-displayphoto-crop_800_800/B4DZvcI2XRKQAM-/0/1768924867151?e=1781740800&v=beta&t=sNraMLyYTxxum15afCgOGv2zjyXWsMms2iN1fxhRgCA", "text": "I am excited to share that I have been selected for the FCDC Mentorship Program and paired with with an amazing mentor Faith Uzuegbu \n \nMy writing journey has evolved a lot over the years.\n\nI started in content teams where we wrote across multiple niches  from news articles and biographies to product reviews, blog content, and digital publishing. Later, I moved into editing across tech, business, lifestyle, and digital content.\n\nOver time, I realized that being able to write is one thing, but knowing how to position yourself strategically is another.\n\nAfter years of working across different areas, I became more intentional about refining my direction in B2B SaaS content, content strategy, and long-term career growth.\n\nThat’s one reason I am genuinely excited about this mentorship experience.\n\nOver the next few weeks, I will be learning more about:\n\n✅clarity and positioning\n✅ client acquisition and monetization\n✅systems, workflows, and using AI tools effectively\n✅scaling sustainably and building long-term growth\n\nI will be learning from someone ahead of me, grow through the process, and share parts of the journey and lessons along the way.\n\nA huge thank you to chima mmeje🏳️‍🌈 for creating this opportunity and to The FCDC  Community for building a community that gives people access to mentorship, growth, and opportunities \n\n#FCDC\n#Mentorship\n#B2BContent\n#ContentStrategy\n#ContentMarketing\n#SEO\n#AIForWork\n#LearningAndGrowth", "url": "https://www.linkedin.com/posts/chiamaka-chinedu-ogbu-b64117136_fcdc-mentorship-b2bcontent-activity-7465796621570867201-vobt", "ts_ms": 1779986929258, "ago": "1d ago", "likes": 25, "comments": 6, "shares": 1, "engagement": 32, "is_repost": false}, {"platform": "linkedin", "source": "voice", "bucket": "Dr Marie Haynes", "author": "Marie Haynes", "headline": "I like learning about Google and AI.", "author_url": "https://www.linkedin.com/in/marie-haynes?miniProfileUrn=urn%3Ali%3Afsd_profile%3AACoAABTEgqoBA1RLWT0a_i-amfIRqA4yZA25Kp4", "avatar": "https://media.licdn.com/dms/image/v2/D4E03AQHq6Ewa6-N8Uw/profile-displayphoto-crop_800_800/B4EZi6dOIwHoAI-/0/1755474880308?e=1781740800&v=beta&t=JLPaHvhfu4E30czDRVFq1VPXzwPS_2ivjEY4JYksR08", "text": "Nice! Google just made so that any website can invite their readers to add them as a preferred source, making it more likely for that site to be seen in AI Overviews and AI Mode.\n\nhttps://lnkd.in/eKHBeNTp", "url": "https://www.linkedin.com/posts/marie-haynes_new-from-google-how-to-become-a-preferred-activity-7465488945921867778-eLFO", "ts_ms": 1779911266785, "ago": "2d ago", "likes": 27, "comments": 3, "shares": 1, "engagement": 31, "is_repost": false}, {"platform": "linkedin", "source": "voice", "bucket": "Glenn Gabe", "author": "Glenn Gabe", "headline": "President of G-Squared Interactive LLC", "author_url": "https://www.linkedin.com/in/glenngabe?miniProfileUrn=urn%3Ali%3Afsd_profile%3AACoAAAFUiYUBc529kqRUB0OhVrQtWpoW9jiP2eQ", "avatar": "https://media.licdn.com/dms/image/v2/D4E03AQHlph8yA_nSEw/profile-displayphoto-crop_800_800/B4EZe7T6gpHwAI-/0/1751194249555?e=1781740800&v=beta&t=o69_Zgw0YTA1X9pEVcO_6mK1eN1ndzxfXjM2Fciz7-8", "text": "Google's Sundar Pichai on the Decoder podcast basically explaining how Navboost works :) -> Sundar Pichai explains how Google can measure user happiness to improve the quality of the product (not short-term, but long-term). User unhappiness shows in the data and Google can course correct. They can track this over the longer-term (cough, Navboost), with engagements, sessions, bounces, returning to a topic, etc. \n\nhttps://lnkd.in/e9F247qN", "url": "https://www.linkedin.com/posts/glenngabe_googles-sundar-pichai-on-the-decoder-podcast-activity-7465391669002162176-ZmCq", "ts_ms": 1779888074160, "ago": "2d ago", "likes": 26, "comments": 2, "shares": 3, "engagement": 31, "is_repost": false}, {"platform": "linkedin", "source": "voice", "bucket": "Carrie Rose", "author": "Carrie Rose", "headline": "CEO & Founder of Rise at Seven - UK & USA 🇺🇸", "author_url": "https://www.linkedin.com/in/carrieroseballoch?miniProfileUrn=urn%3Ali%3Afsd_profile%3AACoAAAl0C40Bx1XZ00XYqnt9ORytcqN_DGsBa5M", "avatar": "https://media.licdn.com/dms/image/v2/D4E03AQGjyxESbr4pmA/profile-displayphoto-shrink_800_800/B4EZdfuMeiHgAg-/0/1749657636165?e=1781740800&v=beta&t=L29vSjxXiYN0lgC2eGykHXfJwU2kuMtJnzATkb1XtPw", "text": "The ones that are impacting LLM/AI visibility , are sitting outside the SEO team 🔥 HOT TAKE🔥\n\nAnd they’re not talking to each other…\n\nJust think… a study by Peec AI analysed 30MILLION sources cited by LLMs, and the top ten were: Reddit, YouTube, LinkedIn, Wikipedia, Forbes, G2, Yelp, Facebook, Medium and TechRadar. \n\nNot a single brand-owned property in the list.\n\nEach of those has a different team owning it inside most brands. \nForbes sits with PR. \nWikipedia with comms. \nReddit with community. \nLinkedIn and YouTube with social. \nG2 and Yelp with customer ops.\n\nNone of them have historically reported into SEO, and most of them still don't talk to SEO.\n\nYou need to start thinking like a content marketer, creating and optimising content for these 👆 channels - building entity signals in everything you do.\n\nI’ve literally got examples to prove it (where 600 media placements and smart entity building with the right optimisations offsite got our client to 70% share of voice in AI/LLMs - which was #1 in market\n\nRead Matt Holmes thoughts on it (link in comments)", "url": "https://www.linkedin.com/posts/carrieroseballoch_the-ones-that-are-impacting-llmai-visibility-activity-7466118362406924289-6ngf", "ts_ms": 1780061331369, "ago": "11h ago", "likes": 21, "comments": 10, "shares": 0, "engagement": 31, "is_repost": false}, {"platform": "linkedin", "source": "voice", "bucket": "Chima Mmeje", "author": "The FCDC", "headline": "5,865 followers", "author_url": "https://www.linkedin.com/company/the-fcdc/posts", "avatar": "https://media.licdn.com/dms/image/v2/C4D0BAQH_oqLC-tjikQ/company-logo_400_400/company-logo_400_400/0/1630574735195?e=1781740800&v=beta&t=1TC9CCPm3VS-9L3ghZQ-EWInZTA75QW_kRU5QVopi3s", "text": "Have you been trying to optimise your LinkedIn profile, but nothing seems to be working?\n\nThen this is for you!\n\nOn June 24, Joe Glover will be reviewing the FCDC members' profiles live to show you how to position your page for better opportunities and engagement.\n\nJoe is the co-founder of The Marketing Meetup and has built a 50,000-strong community right here on LinkedIn, so you don't want to miss this session.\n\nDate: June 24, 2026\nTime: 1:00 PM BST / WAT\n📍 Live webinar\n\nLink to register here in the comments.\n\nPlease RT for more people who need this to see it!", "url": "https://www.linkedin.com/posts/the-fcdc_have-you-been-trying-to-optimise-your-linkedin-activity-7464933351662080000-irP2", "ts_ms": 1779788336034, "ago": "3d ago", "likes": 23, "comments": 2, "shares": 4, "engagement": 29, "is_repost": false}, {"platform": "linkedin", "source": "voice", "bucket": "Mordy Oberstein", "author": "Mordy Oberstein", "headline": "Head of Brand at SE Ranking |Brand Strategy | Search Marketing | Product Marketing", "author_url": "https://www.linkedin.com/in/mordyoberstein?miniProfileUrn=urn%3Ali%3Afsd_profile%3AACoAAAMaDO0BwNfF0bMrDmlHtts_8Gcdpc2vCeI", "avatar": "https://media.licdn.com/dms/image/v2/D4D03AQEk-xCkISc3Yw/profile-displayphoto-shrink_800_800/profile-displayphoto-shrink_800_800/0/1723557044911?e=1781740800&v=beta&t=D2q74jeKNBs79vb9FufTa9Sdj3JUtzrGt24eLTd5jVA", "text": "Crowdsourcing time! LLM visibility has forced this conversation on us (it's about damn time!)\n\nQ: What happens on one channel impacts what happens on the next channel (always has, but now we HAVE to deal with it). \n\nYet, teams are built according to channels... \n\nYou see the problem. \n\nGreat, so what I would like to know is:\n\n🤯 How do you unsilo your team structure and team thinking?! 🤯\n\nWill be featuring some of the best comments here during our event on June 9 with Rand Fishkin Alli Berry, MBA Dana DiTomaso Ross Simmonds Bogdan Babiak Miruna Dragomir Crystal Carter Eli Schwartz Sarah Whittle as brought to you by SE Ranking & Planable", "url": "https://www.linkedin.com/posts/mordyoberstein_crowdsourcing-time-llm-visibility-has-forced-activity-7465386325928468480-0ZuM", "ts_ms": 1779886800272, "ago": "2d ago", "likes": 21, "comments": 6, "shares": 1, "engagement": 28, "is_repost": false}, {"platform": "linkedin", "source": "voice", "bucket": "Fery Kaszoni", "author": "Fery Kaszoni", "headline": "SEO case studies - Digital PR case studies", "author_url": "https://www.linkedin.com/in/ferenczkaszoni?miniProfileUrn=urn%3Ali%3Afsd_profile%3AACoAABBP5V4BwVGlR4pJgWivMRUNOAy1qQFPlPI", "avatar": "https://media.licdn.com/dms/image/v2/D4E03AQG1GqYfAbqPfQ/profile-displayphoto-crop_800_800/B4EZpLprgRIoAI-/0/1762205809023?e=1781740800&v=beta&t=FXVkHrWvb3cPWSb2cRGDYPj0d76AYEa2q5ou0UxSCX0", "text": "We got our client in The Sun, by talking about... the sun.\n\nWe leveraged the UK heatwave to come up with an expert commentary idea for our pet retailer client.\n\nOur client commented on heatwaves and allergies, which can be caused by pets who spend more time outdoors and bring in pollen with their fur.\n\nWe advised that pet owners should wash their bedding and accessories every two weeks.\n\nWe also shared tips such as using baking soda when washing the accessories, washing your car more frequently, and clothing tips for both the humans and their furry friends.\n\nWe wrote up a simple email with these tips and sent it out to mainstream press, just as the heatwave was sweeping through the UK.\n\nMany journalists loved the story, and it even got us linked in The Sun.\n\nExpert commentary is all about timing, having the right expert, and having useful, great angles that the target audience would want to read.\n\nOh, and of course, about email deliverability, but that's another (very important) topic for a future post.", "url": "https://www.linkedin.com/posts/ferenczkaszoni_we-got-our-client-in-the-sun-by-talking-activity-7465378182163267584-4J9q", "ts_ms": 1779884858647, "ago": "2d ago", "likes": 20, "comments": 5, "shares": 1, "engagement": 26, "is_repost": false}, {"platform": "x", "source": "voice", "bucket": "Aleyda Solís", "author": "Aleyda Solis 🕊️", "headline": "@aleyda", "author_url": "https://x.com/aleyda", "avatar": "https://pbs.twimg.com/profile_images/1803039284108083200/i0blVR4I_normal.jpg", "text": "🚨 I’ve just updated my AI Search Optimization Checklist (and worksheet) 👇\n\nFollowing a workflow for a strategical AI search optimization process:\n\n✅ Which prompts and journeys do we actually want to influence?\n✅ Where are we visible, cited, recommended or missing?\n✅ Which owned pages and third-party sources are shaping the answers?\n✅ What needs to be fixed: content, accessibility, entity clarity, source ecosystem, commercial data, localization…?\n✅ How do we validate if the changes moved the needle?\n✅ How do we report progress without overclaiming AI impact?\n\nIt now includes:\n⭐️ 12 practical AI search optimization steps\n⭐️ Examples and “what good looks like” sections\n⭐️ Prompt and presence measurement guidance\n⭐️ Gap diagnosis and prioritization examples\n⭐️ Source ecosystem mapping\n⭐️ Commercial and transactional readiness checks\n⭐️ International/local AI search considerations\n⭐️ Reporting guidance to separate observed, proxy and modelled signals\n⭐️ A recurring validation workflow\n⭐️ A downloadable checklist worksheet to use it in practice\n\nThe biggest point I’d emphasize: AI search optimization should start with understanding which AI-assisted journeys matter, how your brand appears across them, which sources influence the answers, and what you need to improve to be selected, cited, recommended and accurately represented.\n\nGuide + checklist worksheet here:\n\nhttps://t.co/e87HMPhDce", "url": "https://x.com/aleyda/status/2060386798702850415", "ts_ms": 1780069467000, "ago": "8h ago", "likes": 19, "comments": 3, "shares": 4, "engagement": 26, "is_repost": false}, {"platform": "linkedin", "source": "voice", "bucket": "Mordy Oberstein", "autho dn.com/dms/image/v2/D5603AQFQwx6W1cayMQ/profile-displayphoto-shrink_800_800/profile-displayphoto-shrink_800_800/0/1730737255706?e=1781740800&v=beta&t=71ZYKhV977q8w5dES2Xu97GdYQfkEiPhqGgP3P9tprg", "text": "Happy 7th birthday to Women in Tech SEO. 💛\n\nIt’s hard to put into words what this community has meant to me.\nWomen in Tech SEO has been more than a group of incredibly smart women in search. It has been a place to learn, ask questions, feel supported, be challenged, and be reminded that there is room for all of us to grow.\n\nPersonally and professionally, this community has been such a guiding force in my life. It has helped me find confidence, perspective, connection, and inspiration during seasons when I needed it most. I’m so grateful for the generosity, knowledge, encouragement, and leadership that this group continues to pour into the SEO industry.\n\nTo Areej AbuAli, Erin Simmons (they/them), and everyone who has helped build, lead, contribute to, and show up for Women in Tech SEO: thank you. You’ve created something really special.\n\nCheers to 7 years of community, growth, support, and lifting each other up. 🥂", "url": "https://www.linkedin.com/posts/tess-voecks-leadership-transformation-operations_happy-7th-birthday-to-women-in-tech-seo-ugcPost-7466169390338842624-rChU", "ts_ms": 1780075572634, "ago": "7h ago", "likes": 19, "comments": 2, "shares": 2, "engagement": 23, "is_repost": false}, {"platform": "linkedin", "source": "voice", "bucket": "Glenn Gabe", "author": "Glenn Gabe", "headline": "President of G-Squared Interactive LLC", "author_url": "https://www.linkedin.com/in/glenngabe?miniProfileUrn=urn%3Ali%3Afsd_profile%3AACoAAAFUiYUBc529kqRUB0OhVrQtWpoW9jiP2eQ", "avatar": "https://media.licdn.com/dms/image/v2/D4E03AQHlph8yA_nSEw/profile-displayphoto-crop_800_800/B4EZe7T6gpHwAI-/0/1751194249555?e=1781740800&v=beta&t=o69_Zgw0YTA1X9pEVcO_6mK1eN1ndzxfXjM2Fciz7-8", "text": "\"Introducing automatic AI detection\" -> YouTube makes its AI content labels more prominent on desktop and mobile, and will apply them automatically if it detects \"significant photorealistic AI use\"\n\n\"Under YouTube’s guidelines, creators will still be required to manually  disclose when they use realistic AI. But starting this week, it also will roll out a new internal system to help identify AI-generated content. “If a creator doesn’t specify whether or not they used AI, but our systems detect significant photorealistic AI use, we will now automatically apply a label,” YouTube said.\" \n\nhttps://lnkd.in/dXGQ5SkF", "url": "https://www.linkedin.com/posts/glenngabe_introducing-automatic-ai-detection-youtube-activity-7465423853473906691-XO88", "ts_ms": 1779895747536, "ago": "2d ago", "likes": 15, "comments": 5, "shares": 2, "engagement": 22, "is_repost": false}, {"platform": "linkedin", "source": "voice", "bucket": "Joy Hawkins", "author": "Joy Hawkins", "headline": "Helping small businesses grow with local SEO.", "author_url": "https://www.linkedin.com/in/joyhawkins?miniProfileUrn=urn%3Ali%3Afsd_profile%3AACoAAAIvHIgBFnUgzjdLjJx74vxPgs_PTkCMekw", "avatar": "", "text": "Google is suspending profiles for eXp real estate agents. According to a support thread, Google is stating eXp's business model makes the agents ineligible.\n\nI don't believe that to be true. If the agents meet their clients in person, they would be allowed a business profile. Have you seen any agents get suspended due to this?", "url": "https://www.linkedin.com/posts/joyhawkins_google-is-suspending-profiles-for-exp-real-activity-7466166175517794304-hD37", "ts_ms": 1780072730903, "ago": "8h ago", "likes": 14, "comments": 6, "shares": 2, "engagement": 22, "is_repost": false}, {"platform": "linkedin", "source": "voice", "bucket": "Kristina Azarenko", "author": "Kristina Azarenko Sparks", "headline": "I help experts get paid to create their course or group program before building a single lesson using my Get P", "author_url": "https://www.linkedin.com/in/kristinaazarenko?miniProfileUrn=urn%3Ali%3Afsd_profile%3AACoAAAgLHXEByfbgZ7LbfZywEcqn1wVHbSoVcdA", "avatar": "https://media.licdn.com/dms/image/v2/D4E03AQEmW8GlDGzf-A/profile-displayphoto-crop_800_800/B4EZ1k2GLvJ4AI-/0/1775513398059?e=1781740800&v=beta&t=aszfjZKTMIgEX5nhHR0m--0dRDrVYGG2Zd1B_qrxYwM", "text": "Being an entrepreneur means stubbing your pinky finger in the dark.\n\nHere's why 👇\n\nWhen you are an entrepreneur, you don’t have ANY certainty. You’re always moving in the dark (and occasionally stubbing your pinky finger real hard) while also making it look as if you are in control.\n\nAnd I think this is the hardest part:\n\nLooking confident on the outside while uncertainty is eating you up from the inside.\n\nIt’s lonely. And it sucks.\n\nHave you ever felt it?\n\nI have.\n\nWhen I just started my business, I made it my goal to arrive at a place where I have all the answers and know exactly what I'm doing in the next years.\n\nAnd in some moments, I did feel certain.\n\nBut in 7 years being an entrepreneur, I can count these moments on the fingers of one hand.\n​\n😎I felt certain when I quit my 9 to 5 to start a business.\n😢 But then I realized I’d created another job for myself.\n\n😎 I felt certain when I launched my course on technical SEO and it made $50k in the first weeks.\n😢 $450k later, I got bored of talking only about one topic.\n\n😎 I felt certain when I was traveling around the world to speak on big stages, and people would recognize me.\n😢 But then I started questioning if I wanted to always be away from home.\n​\nSo it’s never linear.\n\nBecause when you hit a certainty point, you also start hearing that voice saying, “Okay, but will this last?”\n\nAnd the answer is you don't know.\n\nThat's why you’ll never meet an entrepreneur who has all the answers and has everything figured out. It's just impossible.\n\nI guess the answer is to give yourself permission to say “I don't know.”\n\nI’m still learning.\n\nLet's learn together, ok?", "url": "https://www.linkedin.com/posts/kristinaazarenko_being-an-entrepreneur-means-stubbing-your-activity-7465448506753757185-rSBr", "ts_ms": 1779901625336, "ago": "2d ago", "likes": 20, "comments": 1, "shares": 0, "engagement": 21, "is_repost": false}, {"platform": "linkedin", "source": "voice", "bucket": "Mordy Oberstein", "author": "Mordy Oberstein", "headline": "Head of Brand at SE Ranking |Brand Strategy | Search Marketing | Product Marketing", "author_url": "https://www.linkedin.com/in/mordyoberstein?miniProfileUrn=urn%3Ali%3Afsd_profile%3AACoAAAMaDO0BwNfF0bMrDmlHtts_8Gcdpc2vCeI", "avatar": "https://media.licdn.com/dms/image/v2/D4D03AQEk-xCkISc3Yw/profile-displayphoto-shrink_800_800/profile-displayphoto-shrink_800_800/0/1723557044911?e=1781740800&v=beta&t=D2q74jeKNBs79vb9FufTa9Sdj3JUtzrGt24eLTd5jVA", "text": "ONE week from TODAY! Come say whatever you want to Barry to his face, live, in person! That's the only angle I got on this thing. \n\nIf I were you, I would root hard that there is NO big SEO or PPC news that day! \n\nWhy? Glad you asked. \"It's New\", our daily SEO news show where you can get yesterday's news today... usually takes 10 minutes. \n\nAt 10:01 you can already see Barry Schwartz starting to squirm as Greg Finn goes on about some PPC thing or whatnot. \n\nBut what if there is NO big SEO or PPC news? Wouldn't that put our live recording live from SMX - Search Marketing Expo in a tight spot live in person? \n\nLet me tell you something. It already is in a tight spot. Our plan for the \"other 20 minutes,\" even if there is BIG NEWS is \"more banter\" - so basically me and Anu Adegbola, mMBA saying random stuff. \n\nThis is what you will show up at 8 AM for. This has to be the worst idea for a session EVER. \n\nHey, take your 10-minute show about mostly overly detailed SEO and PPC news... and do it for 30 minutes. \n\nYou got it boss! \n\nThe only upshot of this WHOLE thing is you can come to the \"Solutions Track\" room at SMX... at 8 AM, and you can say whatever... heckling, oAABTEgqoBA1RLWT0a_i-amfIRqA4yZA25Kp4", "avatar": "https://media.licdn.com/dms/image/v2/D4E03AQHq6Ewa6-N8Uw/profile-displayphoto-crop_800_800/B4EZi6dOIwHoAI-/0/1755474880308?e=1781740800&v=beta&t=JLPaHvhfu4E30czDRVFq1VPXzwPS_2ivjEY4JYksR08", "text": "GSC in the API is now showing data up to May 25, which gives us a few days of core update info.\n\nStarting to see several sites with movement that looks related to the update.\nHere's something odd though - I don't see any sites with obvious catastrophic declines - yet. It's early to draw conclusions and sometimes the patterns don't emerge till a week or more has passed.\n\nThe sites with increases so far are a mixture of:\n-YMYL information\n-forums\n-eCommerce\n-affiliate\n-travel\n\nIt's also worth noting it was a holiday weekend in the US this week so this can impact traffic patterns as well.\n\nWill be fun to dig into this one once it finished rolling out and see exactly which pages took off or whether it's a mixture of improvements across the board.", "url": "https://www.linkedin.com/posts/marie-haynes_gsc-in-the-api-is-now-showing-data-up-to-activity-7465418146590609408-C4MG", "ts_ms": 1779894386909, "ago": "2d ago", "likes": 12, "comments": 0, "shares": 2, "engagement": 14, "is_repost": false}, {"platform": "linkedin", "source": "voice", "bucket": "Mordy Oberstein", "author": "Chris Raulf AI SEO Expert", "headline": "102 followers", "author_url": "https://www.linkedin.com/company/international-ai-seo-expert/posts", "avatar": "https://media.licdn.com/dms/image/v2/D560BAQHud3S2LYcVZw/company-logo_400_400/B56ZdHl83fGQAc-/0/1749252822130/seo_consulting_and_training_logo?e=1781740800&v=beta&t=75ersicZ3wb2ZkKNEfgh-W5HH0nNPeEyM4vQ4V7p6LA", "text": "Most marketers are still treating AI search like an optimization problem.\n\nMordy Oberstein, Head of Brand at SE Ranking, is here to tell you that's exactly why it isn't working.\n\nIn the latest AI SEO Insighter Podcast, I sat down with Mordy to unpack what's actually driving visibility in the LLM era.\n\nHis framing changed how I think about it. Digital footprint beats domain age. LLMs don't care about your channels; they care about your digital light. Search engines and LLMs are moths attracted to whatever brand presence burns brightest.\n\nFor 30 years, Google has been chasing brand signals through one proxy after another. PageRank, Hummingbird, RankBrain, the Medic Update, E-E-A-T. Every algorithmic shift has been the same question asked differently. Who is this brand, and should we trust them? LLMs are the next leap, operating on the same logic with way more data.\n\nThe shifts every marketer needs to internalize:\n→ Your About page and Homepage are the only two places you get to define your brand. Use them.\n→ AI Overviews and AI Mode are different products. Optimize differently.\n→ Only 14% citation overlap across AI engines. Brand presence is the constant that pulls you into all three.\n→ Stop optimizing. Start resonating. Performance marketing is hitting an inflection point.\n\nIf you're a CMO, agency owner, or SEO trying to figure out where AI search is actually heading, this is the conversation.\n\nWatch the full episode here: https://lnkd.in/gV2PaFf5\n\n#Branding #AISEO #AEO", "url": "https://www.linkedin.com/posts/international-ai-seo-expert_branding-aiseo-aeo-ugcPost-7465393153030795264-90zn", "ts_ms": 1779951010906, "ago": "1d ago", "likes": 10, "comments": 3, "shares": 1, "engagement": 14, "is_repost": false}, {"platform": "linkedin", "source": "voice", "bucket": "Barry Schwartz", "author": "Barry Schwartz", "headline": "President of RustyBrick, Inc. and Owner, RustyBrick, Inc.", "author_url": "https://www.linkedin.com/in/rustybrick?miniProfileUrn=urn%3Ali%3Afsd_profile%3AACoAAAAOXwgBGvKJ5PG5kuwaTmFUJWimyBar5pw", "avatar": "https://media.licdn.com/dms/image/v2/C4E03AQGEDxg3v7W4WA/profile-displayphoto-shrink_800_800/profile-displayphoto-shrink_800_800/0/1630496745425?e=1781740800&v=beta&t=986G7Ehkc0doFs_sPJr8n6CSXmF_N let state={src:"all", plat:"all", bucket:null, q:"", sort:"engagement"};
const chipsEl=document.getElementById("chips");
function renderChips(){
  let b = state.src==="voice"?VOICES : state.src==="keyword"?KEYWORDS : [];
  chipsEl.innerHTML="";
  b.forEach(x=>{const c=document.createElement("div");
    c.className="chip"+(state.bucket===x?" active":""); c.textContent=x;
    c.onclick=()=>{state.bucket=state.bucket===x?null:x; renderChips(); draw();};
    chipsEl.appendChild(c);});
}
function esc(s){return (s||"").replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}
function initials(n){return (n||"?").replace(/[^A-Za-z ]/g,"").split(" ").filter(Boolean).slice(0,2).map(w=>w[0]).join("").toUpperCase()||"?";}
function fmt(n){return n>=1000?(n/1000).toFixed(1).replace(/\.0$/,'')+"k":n;}
function draw(){
  let l=POSTS.slice();
  if(state.src!=="all")  l=l.filter(p=>p.source===state.src);
  if(state.plat!=="all") l=l.filter(p=>p.platform===state.plat);
  if(state.bucket)       l=l.filter(p=>p.bucket===state.bucket);
  if(state.q){const q=state.q.toLowerCase();
    l=l.filter(p=>(p.text+" "+p.author+" "+p.bucket).toLowerCase().includes(q));}
  l.sort((a,b)=> state.sort==="recent"? b.ts_ms-a.ts_ms : b.engagement-a.engagement);
  const feed=document.getElementById("feed");
  if(!l.length){feed.innerHTML='<div class="empty">No posts match.</div>';return;}
  feed.innerHTML=l.map(p=>{
    const av=p.avatar
      ?`<img class="av" src="${esc(p.avatar)}" referrerpolicy="no-referrer" onerror="this.replaceWith(Object.assign(document.createElement('div'),{className:'av',textContent:'${initials(p.author)}'}))">`
      :`<div class="av">${initials(p.author)}</div>`;
    const plat=p.platform==="linkedin"?`<span class="pill p-li">in</span>`:`<span class="pill p-x">𝕏</span>`;
    const badge=p.source==="voice"?`<span class="badge b-voice">⭐ ${esc(p.bucket)}</span>`
                                   :`<span class="badge b-kw"># ${esc(p.bucket)}</span>`;
    const rep=p.is_repost?`<span class="badge b-rep">↻ repost</span>`:"";
    const long=(p.text||"").length>360;
    return `<div class="card">
      <div class="row">${av}
        <div style="min-width:0"><div class="name">${esc(p.author)}</div>
        <div class="head">${esc(p.headline)}</div></div>
        <div class="meta">${esc(p.ago)}</div></div>
      <div>${plat}${badge}${rep}</div>
      <div class="text ${long?'clamp':''}">${esc(p.text)}</div>
      ${long?`<span class="more" onclick="this.previousElementSibling.classList.toggle('clamp');this.textContent=this.textContent.includes('Show')?'Show less':'Show more'">Show more</span>`:''}
      <div class="foot"><span>👍 ${fmt(p.likes)}</span><span>💬 ${fmt(p.comments)}</span><span>🔁 ${fmt(p.shares)}</span>
        ${p.url?`<a href="${esc(p.url)}" target="_blank">Open →</a>`:''}</div></div>`;
  }).join("");
}
document.querySelectorAll(".tab").forEach(t=>t.onclick=()=>{
  document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));
  t.classList.add("active"); state.src=t.dataset.src; state.bucket=null; renderChips(); draw();});
document.querySelectorAll("#plat div").forEach(d=>d.onclick=()=>{
  document.querySelectorAll("#plat div").forEach(x=>x.classList.remove("active"));
  d.classList.add("active"); state.plat=d.dataset.plat; draw();});
document.getElementById("q").oninput=e=>{state.q=e.target.value; draw();};
document.getElementById("sort").onchange=e=>{state.sort=e.target.value; draw();};
renderChips(); draw();
</script>
