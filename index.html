const POSTS=[{"platform": "linkedin", "source": "voice", "bucket": "Patrick Stox", "author": "Patrick Stox", "headline": "Product Advisor, Technical SEO, & Brand Ambassador at Ahrefs", "author_url": "https://www.linkedin.com/in/patrickstox?miniProfileUrn=urn%3Ali%3Afsd_profile%3AACoAAAMO5mUBX0XPZ9sSJQmgODr6I0IiBaukMSs", "avatar": "https://media.licdn.com/dms/image/v2/C4D03AQGNnyX2nd1lTA/profile-displayphoto-shrink_800_800/profile-displayphoto-shrink_800_800/0/1602613362862?e=1781740800&v=beta&t=g8JozsjsJELSHizvUMJnVZEWAGKhBSZ4k3DKNfkYl6o", "text": "Today is my last day at Ahrefs after 6.5+ years. I'm incredibly proud to have helped shape such an amazing product.\n\nI plan to do some consulting and build some things. Let me know if you need help with anything technical SEO, programmatic, ai search, etc. Potentially open to the right in-house opportunity.\n\nLikes / shares appreciated for visibility. 🙏", "url": "https://www.linkedin.com/posts/patrickstox_today-is-my-last-day-at-ahrefs-after-65-activity-7465034282005356544-SyCQ", "ts_ms": 1779802866460, "ago": "3d ago", "likes": 1278, "comments": 160, "shares": 24, "engagement": 1462, "is_repost": false}, {"platform": "linkedin", "source": "voice", "bucket": "Lidia Infante", "author": "Daniel Foley Carter", "headline": "SEO Specialist with 25+ years experience. Extensive experience in SEO auditing, strategy, execution & training", "author_url": "https://www.linkedin.com/in/daniel-foley-assertive?miniProfileUrn=urn%3Ali%3Afsd_profile%3AACoAAAXsNsUBYWyqVPkglBZEBgbvMTqovBcjEC0", "avatar": "https://media.licdn.com/dms/image/v2/D4E03AQFKmeI4x145Pg/profile-displayphoto-crop_800_800/B4EZ1eMN8zIQAI-/0/1775401756024?e=1781740800&v=beta&t=Ao4CBZjuU84uNf_VpBuwjxRE3VoJZf-EJ7CJvSl-jZ8", "text": "Google: today we announce the May 2026 core update\n\nClients who brought a $99 claude automation SEO agent:  Hold my beer.", "url": "https://www.linkedin.com/posts/daniel-foley-assertive_google-today-we-announce-the-may-2026-core-activity-7463559376549879809-Zkoj", "ts_ms": 1779626112376, "ago": "5d ago", "likes": 1221, "comments": 73, "shares": 48, "engagement": 1342, "is_repost": false}, {"platform": "linkedin", "source": "voice", "bucket": "Lily Ray", "author": "Lily Ray", "headline": "Founder of Algorythmic | VP, SEO & AI Search at Amsive", "author_url": "https://www.linkedin.com/in/lily-ray-44755615?miniProfileUrn=urn%3Ali%3Afsd_profile%3AACoAAAMbS_cB5oBncl3cqM77vhE15wiYCxEqinE", "avatar": "https://media.licdn.com/dms/image/v2/D4E03AQHubTQsuaQJew/profile-displayphoto-shrink_800_800/profile-displayphoto-shrink_800_800/0/1667424638143?e=1781740800&v=beta&t=M3VwzHLApRKZAKHOdxbt9RA6V3UDhIN0wiJ65btGCIA", "text": "I just found all the secrets I’ve been looking for in Ancient Greece 😂🇬🇷", "url": "https://www.linkedin.com/posts/lily-ray-44755615_i-just-found-all-the-secrets-ive-been-looking-activity-7464289260985122816-jW8c", "ts_ms": 1779625239607, "ago": "5d ago", "likes": 590, "comments": 42, "shares": 0, "engagement": 632, "is_repost": false}, {"platform": "linkedin", "source": "voice", "bucket": "Rand Fishkin", "author": "Rand Fishkin", "headline": "Co-author of Zero Click Marketing (preorder now!), founder of SparkToro, Alertmouse, & Snackbar Studio", "author_url": "https://www.linkedin.com/in/randfishkin?miniProfileUrn=urn%3Ali%3Afsd_profile%3AACoAAAAhO3EBD7HOVVZV7GCfFNLw-dl4PMkEK54", "avatar": "https://media.licdn.com/dms/image/v2/D5603AQHwJ2u_k15CGA/profile-displayphoto-shrink_800_800/profile-displayphoto-shrink_800_800/0/1680388120786?e=1781740800&v=beta&t=HYqSUpEawyJyIgaTdWuSbLso1iOB1k0Zks0RlFT6QbI", "text": "We've got PROOF. Proof that the Zero-Click Web isn't just about users choosing to visit fewer websites, or about preferences for staying in an interface (as big tech cos have tried to claim).\n\nThanks to Adelle Kehoe and Sam Sheridan from SimilarWeb, we can see exactly how changes inside an AI tool (like ChatGPT) impact web visitation rates. 👇👇👇", "url": "https://www.linkedin.com/posts/randfishkin_weve-got-proof-proof-that-the-zero-click-activity-7465119217512636416-_S3s", "ts_ms": 1779823116663, "ago": "3d ago", "likes": 457, "comments": 67, "shares": 43, "engagement": 567, "is_repost": false}, {"platform": "linkedin", "source": "voice", "bucket": "Rand Fishkin", "author": "Rand Fishkin", "headline": "Co-author of Zero Click Marketing (preorder now!), founder of SparkToro, Alertmouse, & Snackbar Studio", "author_url": "https://www.linkedin.com/in/randfishkin?miniProfileUrn=urn%3Ali%3Afsd_profile%3AACoAAAAhO3EBD7HOVVZV7GCfFNLw-dl4PMkEK54", "avatar": "https://media.licdn.com/dms/image/v2/D5603AQHwJ2u_k15CGA/profile-displayphoto-shrink_800_800/profile-displayphoto-shrink_800_800/0/1680388120786?e=1781740800&v=beta&t=HYqSUpEawyJyIgaTdWuSbLso1iOB1k0Zks0RlFT6QbI", "text": "I really like experiments like these. Please can more companies try putting measurable forms of marketing on AI autopilot? Your social posts, your email newsletters, your YouTube campaigns... then report back with how the metrics graph looks! Srsly -- I wanna see it!", "url": "https://www.linkedin.com/posts/randfishkin_it-finally-happeneda-client-went-rogue-activity-7465919009734008832-vVlt", "ts_ms": 1780013801988, "ago": "1d ago", "likes": 425, "comments": 50, "shares": 17, "engagement": 492, "is_repost": false}, {"platform": "linkedin", "source": "voice", "bucket": "Rand Fishkin", "author": "Rand Fishkin", "headline": "Co-author of Zero Click Marketing (preorder now!), founder of SparkToro, Alertmouse, & Snackbar Studio", "author_url": "https://www.linkedin.com/in/randfishkin?miniProfileUrn=urn%3Ali%3Afsd_profile%3AACoAAAAhO3EBD7HOVVZV7GCfFNLw-dl4PMkEK54", "avatar": "https://media.licdn.com/dms/image/v2/D5603AQHwJ2u_k15CGA/profile-displayphoto-shrink_800_800/profile-displayphoto-shrink_800_800/0/1680388120786?e=1781740800&v=beta&t=HYqSUpEawyJyIgaTdWuSbLso1iOB1k0Zks0RlFT6QbI", "text": "NEW post: https://lnkd.in/gDHdeDgX\n\nI almost never write blog posts anymore, but this one felt necessary.\n\nIgnore traffic. Make inimitable products. Shift your priorities away from “great content” on your own site and toward “great marketing” on the platforms where your audience pays attention. Influence is the new traffic.", "url": "https://www.linkedin.com/posts/randfishkin_new-post-httpslnkdingdhdedgx-i-almost-activity-7464770969820360704-o1ap", "ts_ms": 1779740087943, "ago": "4d ago", "likes": 350, "comments": 106, "shares": 31, "engagement": 487, "is_repost": false}, {"platform": "linkedin", "source": "voice", "bucket": "Darren Shaw", "author": "Darren Shaw", "headline": "Founder of Whitespark. I share local SEO tips and strategy. Lead researcher behind the annual Local Search Ran", "author_url": "https://www.linkedin.com/in/darrenshawwhitespark?miniProfileUrn=urn%3Ali%3Afsd_profile%3AACoAAACfvt4BlTIYKNipotkJmjYVfXOkoWpMH7o", "avatar": "https://media.licdn.com/dms/image/v2/D5603AQGPRN78FYknrA/profile-displayphoto-shrink_800_800/profile-displayphoto-shrink_800_800/0/1685132735631?e=1781740800&v=beta&t=fwxWJ_WrTJpb5CXYv0R0-Htu3Rxy9JQOgYSQX8RxfXA", "text": "This is going to be a massive shift for local businesses: Google is basically putting AI into everything search does. Soon, customers won’t just search “denver plumbers”.\n\nThey’ll use conversational search prompts like: “Find me a highly rated plumber available tomorrow who can handle clearing a drain in an antique clawfoot tub in a heritage home.”\n\nAnd Google’s AI will compare options, check details, and even call businesses to get quotes. \n\nThis means your website and Google Business Profile now need to clearly explain:\n\n- What services you offer;\n- How much you charge;\n- What payment methods you accept;\n- Where you serve;\n- When you’re available;\n- What makes you trustworthy;\n- What type of jobs you specialize in (and which ones you don't);\n- Why someone should choose you.\n\nYou need to make sure you’ve provided every tiny, nuanced detail about your business if you want to be visible in these more detailed AI Mode prompts.", "url": "https://www.linkedin.com/posts/darrenshawwhitespark_this-is-going-to-be-a-massive-shift-for-local-activity-7464700469894987776-hrew", "ts_ms": 1779723279451, "ago": "4d ago", "likes": 323, "comments": 68, "shares": 44, "engagement": 435, "is_repost": false}, {"platform": "linkedin", "source": "voice", "bucket": "Lily Ray", "author": "Lily Ray", "headline": "Founder of Algorythmic | VP, SEO & AI Search at Amsive", "author_url": "https://www.linkedin.com/in/lily-ray-44755615?miniProfileUrn=urn%3Ali%3Afsd_profile%3AACoAAAMbS_cB5oBncl3cqM77vhE15wiYCxEqinE", "avatar": "https://media.licdn.com/dms/image/v2/D4E03AQHubTQsuaQJew/profile-displayphoto-shrink_800_800/profile-displayphoto-shrink_800_800/0/1667424638143?e=1781740800&v=beta&t=M3VwzHLApRKZAKHOdxbt9RA6V3UDhIN0wiJ65btGCIA", "text": "Since Google I/O, my social feeds (and not just the ones I use for SEO) have been filled with people complaining about the new AI features in search and asking about Google alternatives. The same thing happened when Google first launched AI Overviews - there was a huge wave of users asking how to turn them off.\n\nI get that every time technology evolves, there's some level of pushback; people get stuck in their ways and resist change. It's also possible that people are simply more vocal online when they're unhappy, while those who don't mind the change quietly go about their day without going online to complain. Still, I find it interesting to compare the apparent public sentiment with what Google keeps saying about users loving all these new AI features.\n\nYesterday, Carl Hendy wrote a great post (link in comments) about exactly this disconnect between Google's repeated claims that 'users love their new AI products' and what consumers seem to be saying everywhere else.\n\nFrom Carl's research: \"every claim that users prefer AI Search traces back to one source. Google. The internal Search data is Google's. The AI Mode usage numbers are Google's. The 'users are happier' message is Google's. What is missing is independent evidence. There is no data-backed study from Google showing that users prefer AI-generated results over traditional web results. As far as I can find, no one has run one.\"\n\nThen today, TechCrunch shared that DuckDuckGo installs are up 30% as users look for Google alternatives (link also in comments). I pointed out on X that it was interesting that we didn't see this kind of surge when AI Overviews first launched, and Kamyl Bazbaz (Chief Communications & Public Affairs at DuckDuckGo) replied that he thinks Google's more dramatic recent changes with AI in search are finally pushing users to take real action.\n\nI think this is just one example of the building tension between AI companies and the general public. And while it's hard to imagine that a truly meaningful share of users will actually change their online behavior, I think we're seeing the early signs of what will become a significant anti-AI countermovement (especially with increased job losses, the impact on the environment, etc.).", "url": "https://www.linkedin.com/posts/lily-ray-44755615_since-google-io-my-social-feeds-and-not-activity-7465444588200116226-pllb", "ts_ms": 1779900691080, "ago": "2d ago", "likes": 293, "comments": 50, "shares": 21, "engagement": 364, "is_repost": false}, {"platform": "linkedin", "source": "voice", "bucket": "Fery Kaszoni", "author": "Fery Kaszoni", "headline": "SEO case studies - Digital PR case studies", "author_url": "https://www.linkedin.com/in/ferenczkaszoni?miniProfileUrn=urn%3Ali%3Afsd_profile%3AACoAABBP5V4BwVGlR4pJgWivMRUNOAy1qQFPlPI", "avatar": "https://media.licdn.com/dms/image/v2/D4E03AQG1GqYfAbqPfQ/profile-displayphoto-crop_800_800/B4EZpLprgRIoAI-/0/1762205809023?e=1781740800&v=beta&t=FXVkHrWvb3cPWSb2cRGDYPj0d76AYEa2q5ou0UxSCX0", "text": "Google has finally reached AGI 😅", "url": "https://www.linkedin.com/posts/ferenczkaszoni_google-has-finally-reached-agi-activity-7465141127478800384-c-KY", "ts_ms": 1779828340406, "ago": "3d ago", "likes": 247, "comments": 31, "shares": 3, "engagement": 281, "is_repost": false}, {"platform": "linkedin", "source": "voice", "bucket": "Darren Shaw", "author": "Darren Shaw", "headline": "Founder of Whitespark. I share local SEO tips and strategy. Lead researcher behind the annual Local Search Ran", "author_url": "https://www.linkedin.com/in/darrenshawwhitespark?miniProfileUrn=urn%3Ali%3Afsd_profile%3AACoAAACfvt4BlTIYKNipotkJmjYVfXOkoWpMH7o", "avatar": "https://media.licdn.com/dms/image/v2/D5603AQGPRN78FYknrA/profile-displayphoto-shrink_800_800/profile-displayphoto-shrink_800_800/0/1685132735631?e=1781740800&v=beta&t=fwxWJ_WrTJpb5CXYv0R0-Htu3Rxy9JQOgYSQX8RxfXA", "text": "Google is giving us some of the best local SEO data I’ve seen in a long time:\nGoogle’s new Maps lists (like Top Lists, Local Gems, and Trending) show you the exact websites you need to get mentioned on if you want to show up more often in local results.\n\nHuge shoutout to Craig Burton, who did a great deep dive on how these Google Maps Lists work and where they come from.\n\nHow they work:\n\nThe Google Maps Lists aren’t just powered by your Google Business Profile. They’re powered by the evidence Google finds around your business across the web, like:\n\n-Blog posts\n-News articles\n-Local publications\n-Best-of lists\n-Industry websites\n\nGoogle will often show you the exact sources it used to create the list. That's huge! It means you can now scan these lists, see exactly which publications Google trusts, and build a strategy for getting mentioned on those sites.\n\nHow to use this for your business:\n\n1. Open the Google Maps app and browse the lists in your city.\n2. Make note of every publication Google is citing.\n3. Review those sites and see how you could get your business listed on them.\n\nI love how Craig frames this: \nLocal SEO is shifting from Profile optimization to *evidence optimization*\n\nGoogle Business Profile optimization still matters a lot, but it’s not enough anymore. You also need to make sure your business is mentioned across the web in places Google can find and trust. And the good news is, Google is now telling you exactly where those places are.\n\nMake sure to check out Craig’s deep dive on Maps lists here:\nctbmarketing*com/blog/google-maps-lists", "url": "https://www.linkedin.com/posts/darrenshawwhitespark_google-is-giving-us-some-of-the-best-local-activity-7465783599678574592-Uaix", "ts_ms": 1779981517715, "ago": "1d ago", "likes": 214, "comments": 32, "shares": 18, "engagement": 264, "is_repost": false}, {"platform": "linkedin", "source": "voice", "bucket": "Mike King", "author": "Michael King", "headline": "Founder of iPullRank | USA Today Top 10 SEO | 2X Search Marketer of the Year | Author of “The Science of SEO” ", "author_url": "https://www.linkedin.com/in/michaelkingphilly?miniProfileUrn=urn%3Ali%3Afsd_profile%3AACoAAAJ-eXkB2vFQ4XOU01T-X9cnVeUBIzeF5Wc", "avatar": "https://media.licdn.com/dms/image/v2/C4E03AQHgqkpj2xC9Yw/profile-displayphoto-shrink_800_800/profile-displayphoto-shrink_800_800/0/1630268257667?e=1781740800&v=beta&t=IGey4G6Np81GvVPPeJFBdiyroy-QHbDTULrjqmF-EMk", "text": "The open web is dying.\n\nNot slowing. Not changing. Dying.\n\nAccording to Cloudflare, AI bot traffic grew 187% last year. Human traffic grew 3.1%.\n\nThe next medium has already arrived. The market hasn't named it yet, so I went ahead and did it.\n\nWe are shifting into a new era that I'm calling \"Machine Media\"\n\nLet's talk about it 👇🏾", "url": "https://www.linkedin.com/posts/michaelkingphilly_the-open-web-is-dying-not-slowing-not-activity-7465056029903540224-kY5N", "ts_ms": 1779808051563, "ago": "3d ago", "likes": 183, "comments": 50, "shares": 13, "engagement": 246, "is_repost": false}, {"platform": "linkedin", "source": "voice", "bucket": "Lily Ray", "author": "Lily Ray", "headline": "Founder of Algorythmic | VP, SEO & AI Search at Amsive", "author_url": "https://www.linkedin.com/in/lily-ray-44755615?miniProfileUrn=urn%3Ali%3Afsd_profile%3AACoAAAMbS_cB5oBncl3cqM77vhE15wiYCxEqinE", "avatar": "https://media.licdn.com/dms/image/v2/D4E03AQHubTQsuaQJew/profile-displayphoto-shrink_800_800/profile-displayphoto-shrink_800_800/0/1667424638143?e=1781740800&v=beta&t=M3VwzHLApRKZAKHOdxbt9RA6V3UDhIN0wiJ65btGCIA", "text": "This is one of those rare “do this thing and it can help improve your SEO visibility and traffic” moments that’s actually recommended by Google 😂\n\nSo yes, definitely consider asking your audience to add your site as a preferred source on Google. \n\nMany news sites have adopted this over the past year, but now “any site that publishes fresh content” is eligible.\n\nGoogle even provides tips on how to ask your readers to add your site as a preferred source - link in comments.", "url": "https://www.linkedin.com/posts/lily-ray-44755615_preferred-sources-is-no-longer-exclusive-activity-7465854423714607105-xRDM", "ts_ms": 1779998403481, "ago": "1d ago", "likes": 197, "comments": 22, "shares": 15, "engagement": 234, "is_repost": false}, {"platform": "linkedin", "source": "voice", "bucket": "Cyrus Shepard", "author": "Cyrus S.", "headline": "Follow for tips on SEO + AI Growth | Former Head of Global SEO at Moz / Amazon Consultant | Founder, Zyppy Mar", "author_url": "https://www.linkedin.com/in/cyrusshepard?miniProfileUrn=urn%3Ali%3Afsd_profile%3AACoAAAM5ul8B6qayPCFVxvQF349bHXVQfxmn6ho", "avatar": "https://media.licdn.com/dms/image/v2/D5603AQEJ_n8voG2Fpw/profile-displayphoto-shrink_800_800/B56Z4tu9_uJkAY-/0/1778883748057?e=1781740800&v=beta&t=16uQSTAQKrleY907kAuAsncRaF4K66NzWWZqOKuqKak", "text": "Honored to be named Best Speaker of SEO Vibes Summit '26\n\n(though I thought some of the other speakers were likely more deserving with their terrific content)\n\nThank you WhitePress®!", "url": "https://www.linkedin.com/posts/cyrusshepard_honored-to-be-named-best-speaker-of-seo-vibes-activity-7465125075323740160-ae4e", "ts_ms": 1779824513274, "ago": "3d ago", "likes": 198, "comments": 27, "shares": 0, "engagement": 225, "is_repost": false}, {"platform": "linkedin", "source": "voice", "bucket": "Lily Ray", "author": "Lily Ray", "headline": "Founder of Algorythmic | VP, SEO & AI Search at Amsive", "author_url": "https://www.linkedin.com/in/lily-ray-44755615?miniProfileUrn=urn%3Ali%3Afsd_profile%3AACoAAAMbS_cB5oBncl3cqM77vhE15wiYCxEqinE", "avatar": "https://media.licdn.com/dms/image/v2/D4E03AQHubTQsuaQJew/profile-displayphoto-shrink_800_800/profile-displayphoto-shrink_800_800/0/1667424638143?e=1781740800&v=beta&t=M3VwzHLApRKZAKHOdxbt9RA6V3UDhIN0wiJ65btGCIA", "text": "It is indeed intriguing to me that for all the talk about GEO and AI search over the past couple years, Google’s AI Overviews often seem to get left out of the conversation? \n\nTomek Rudzki wrote the article I think the industry has needed all along: \n\n“In my recent analysis of 500,000 prompts, AI Overviews showed up 86% of the time. And yet, AI Overviews barely features in most SEO and GEO conversations I'm part of, even as ChatGPT and Perplexity dominate the discussion.\n\nIf that matches how you're currently splitting your attention, it's worth reconsidering.”", "url": "https://www.linkedin.com/posts/lily-ray-44755615_everyones-talking-about-chatgpt-and-perplexity-activity-7465899590647554048-blVg", "ts_ms": 1780009172117, "ago": "1d ago", "likes": 182, "comments": 30, "shares": 10, "engagement": 222, "is_repost": false}, {"platform": "linkedin", "source": "voice", "bucket": "Koray Tuğberk Gübür", "author": "Koray Tugberk GUBUR", "headline": "CEO and Founder of Holistic SEO & Digital - Fortune 500 SEO and Business Consultant - Topical Authority - Vent", "author_url": "https://www.linkedin.com/in/koray-tugberk-gubur?miniProfileUrn=urn%3Ali%3Afsd_profile%3AACoAABMCp4YBUnkh_U5WEi0yaVvtfSyvYiGywSA", "avatar": "https://media.licdn.com/dms/image/v2/D4D03AQHnu3z8HxJY1g/profile-displayphoto-shrink_800_800/profile-displayphoto-shrink_800_800/0/1703783588185?e=1781740800&v=beta&t=xvYYOj_up5nngAzGf7VA2oaYwrRuShbkB8KwmPrRHAA", "text": "Happy Eid Al-Adha to all of our Muslim friends around the globe. May Allah accept your prayers, sacrifices, patience, and sincere efforts.", "url": "https://www.linkedin.com/posts/koray-tugberk-gubur_happy-eid-al-adha-to-all-of-our-muslim-friends-activity-7465449725530370048-Gx32", "ts_ms": 1779901915915, "ago": "2d ago", "likes": 165, "comments": 17, "shares": 1, "engagement": 183, "is_repost": false}, {"platform": "linkedin", "source": "voice", "bucket": "Kevin Indig", "author": "Kevin Indig", "headline": "Growth Advisor", "author_url": "https://www.linkedin.com/in/kevinindig?miniProfileUrn=urn%3Ali%3Afsd_profile%3AACoAABIhMjcBq8NMgIfgfa69D2M0o-aAH9WT6ZQ", "avatar": "https://media.licdn.com/dms/image/v2/D4E03AQH0W3jJfrJmjg/profile-displayphoto-shrink_800_800/B4EZOTOTj8HkAg-/0/1733341823286?e=1781740800&v=beta&t=PUV9pPGWyIu5dMohiptTZXMOYNtbNOAZqdlfspgeXZw", "text": "The same Google user behaves differently in AI Overviews and AI Mode.\n\nI broke down a new clickstream study of 846k US Google sessions from Feb and March 2026. Prior public Google SERP mouse-tracking studies measured dozens of people. This one analyzed tens of thousands.\n\nThe pattern: AI Mode is autoplay. AI Overviews is the Netflix browse.\n\nIn AI Mode, users accept what they're handed. 88% take the AI's shortlist as-is, 74% pick the top result, and 64% click nothing at all. Closed loop.\n\nIn AI Overviews, the same user starts comparing. Cursor coverage hits 83% of the visible page (vs. 66% without an AIO). Stillness rises from 29% to 44%. Back-scrolling makes up nearly half of all scroll activity. The user reads, weighs, scrolls past, then circles back.\n\nAI Mode optimization is a visibility problem at the model layer. AI Overview optimization is a comparison problem on the SERP itself.\n\nFull breakdown in today's Growth Memo.", "url": "https://www.linkedin.com/posts/kevinindig_the-same-google-user-behaves-differently-activity-7464612137668067328-sXZq", "ts_ms": 1779702219407, "ago": "4d ago", "likes": 141, "comments": 34, "shares": 6, "engagement": 181, "is_repost": false}, {"platform": "linkedin", "source": "voice", "bucket": "Darren Shaw", "author": "Darren Shaw", "headline": "Founder of Whitespark. I share local SEO tips and strategy. Lead researcher behind the annual Local Search Ran", "author_url": "https://www.linkedin.com/in/darrenshawwhitespark?miniProfileUrn=urn%3Ali%3Afsd_profile%3AACoAAACfvt4BlTIYKNipotkJmjYVfXOkoWpMH7o", "avatar": "https://media.licdn.com/dms/image/v2/D5603AQGPRN78FYknrA/profile-displayphoto-shrink_800_800/profile-displayphoto-shrink_800_800/0/1685132735631?e=1781740800&v=beta&t=fwxWJ_WrTJpb5CXYv0R0-Htu3Rxy9JQOgYSQX8RxfXA", "text": "How to get AI to recommend your local business (speedrun checklist) 👇\n\n1. Search your main keywords in AI tools: \nSee which competitors the LLMs are recommending and study their content and citation strategies. (I use WAIKAY for this)\n\n2. Find the sources AI is citing and get mentioned on those sites:\nLook for review sites, directories, local blogs, best-of lists, news sites, and industry publications. If AI trusts those sources, your business should be there.\n\n3. Diversify your reviews:\nKeep getting Google reviews, but also build reviews on other prominent platforms, like Yelp, BBB, and industry sites.\n\n4. Ask for detailed reviews:\nGet customers to mention the service you provided, the problem you solved, and what made the experience good.\n\n5. Make your website easier for AI to understand:\nClearly and concisely answer what you do, where you serve, what it costs, why people should choose you, and what proof you have. Structure key information using semantic triples.\n\n6. Be everywhere:\nGet mentioned on blogs, podcasts, YouTube, Reddit, social media, local news, best-of lists, industry publications, and press releases.\n\n7. Continue optimizing your Google Business Profile:\nYour GBP is still one of the most important sources for local business data, especially for Google’s AI systems. Enhance your description and service descriptions.\n\nIf you want the full checklist with an in-depth explanation of each step, I just published an article on Search Engine Land called, “The new playbook for localized AI search optimization.” Go check it out!", "url": "https://www.linkedin.com/posts/darrenshawwhitespark_how-to-get-ai-to-recommend-your-local-business-activity-7465424383801462784-4h5d", "ts_ms": 1779895873976, "ago": "2d ago", "likes": 135, "comments": 22, "shares": 14, "engagement": 171, "is_repost": false}, {"platform": "linkedin", "source": "voice", "bucket": "Mark Williams-Cook", "author": "Mark Williams-Cook", "headline": "Follow me for 22+ years of SEO experience, unsolicited SEO tips, AI experiments and GEO grift avoidance!", "author_url": "https://www.linkedin.com/in/markseo?miniProfileUrn=urn%3Ali%3Afsd_profile%3AACoAAADSPjwBmR-1JQLF5Fub4RzVMOMuiSNRiis", "avatar": "https://media.licdn.com/dms/image/v2/D4E03AQE_fpA6OtAwlA/profile-displayphoto-crop_800_800/B4EZ50pMOoGwAI-/0/1780073417700?e=1781740800&v=beta&t=sIUyKCPd1fRyUHgrD0Iv0Ap3uxSJDKzqqz4clrGx5S4", "text": "Unsolicited #SEO tip: If you're interested in 'GEO', there is a Princeton peer-reviewed paper from 2024 (where the phrase \"Generative Engine Optimization\" actually comes from.) I read it so you don't have to. Here is the summary of findings. ⤵️ \n\nThey built a benchmark of around 10,000 queries (GEO-Bench) and tested 9 different ways of \"optimising\" a page to get cited more often by generative search engines. Ranked by uplift over the un-optimised baseline:\n\n✅ Quotation Addition: +41%\n✅ Statistics Addition: +31%\n✅ Fluency Optimization: +28%\n✅ Cite Sources: +27%\n✅ Technical Terms: +18%\n✅ Easy-to-Understand: +14%\n✅ Authoritative: +10%\n➖ Unique Words: +6%\n⚠️ Keyword Stuffing: -8%\n\nA few things worth sitting with:\n\nEvery single method they tested is a change to the visible text of the page. Quotes, stats, citations, clearer phrasing.\n\nLower ranked pages benefit the most. \"Cite Soures\" lifted rank-5 pages by +115% on one of their subjective metrics. Useful if you are not already #1.\n\nKeyword stuffing actively hurt visibility, which is at least consistent with the last twenty years of classical SEO advice.\n\nLink in comments if you want a look yourself!", "url": "https://www.linkedin.com/posts/markseo_seo-activity-7465784114206523393-Z5S4", "ts_ms": 1779981640388, "ago": "1d ago", "likes": 137, "comments": 22, "shares": 8, "engagement": 167, "is_repost": false}, {"platform": "linkedin", "source": "voice", "bucket": "Cyrus Shepard", "author": "Cyrus S.", "headline": "Follow for tips on SEO + AI Growth | Former Head of Global SEO at Moz / Amazon Consultant | Founder, Zyppy Mar", "author_url": "https://www.linkedin.com/in/cyrusshepard?miniProfileUrn=urn%3Ali%3Afsd_profile%3AACoAAAM5ul8B6qayPCFVxvQF349bHXVQfxmn6ho", "avatar": "https://media.licdn.com/dms/image/v2/D5603AQEJ_n8voG2Fpw/profile-displayphoto-shrink_800_800/B56Z4tu9_uJkAY-/0/1778883748057?e=1781740800&v=beta&t=16uQSTAQKrleY907kAuAsncRaF4K66NzWWZqOKuqKak", "text": "Do you see *branded* click-through rates (CTRs) decreasing from Google? \n\nCan publishers do anything about it?\n\nThat’s the story I keep hearing from large publishers, based on internal SEO data showing a decrease in brand clicks over the past year.\n\nWe call brand search a \"moat\" in SEO because when people search for you specifically on Google, they are most likely to click through. But what if that effect is weakening? \n\nThe latest research piece by Kevin Indig and Eric Van Buskirk provides much-needed data to explain why this could be happening\n\nhttps://lnkd.in/gNnmJMfA\n\nBased on their analysis of 846,000 sessions, users spend far, far more time on *Google itself* when AI Overviews are present for branded/navigation searches\n\nIn the past, we could rely on branded search to reliably drive clicks. Now, users are much more likely to read + evaluate info on Google itself before clicking. \n\nThree conclusions for publishers I take away from this piece:\n\n1) Once again, the clear winner is Google - users can now get far more information about you from Google itself without needing to click through\n2) Publishers should continue to expect decreased CTRs from branded search as AI Overviews/AI Mode continue to evolve\n3) If users are spending more time reading AI Answers about you on Google, it's increasingly critical to make sure that AI Overviews contain accurate + compelling information about your brand", "url": "https://www.linkedin.com/posts/cyrusshepard_do-you-see-branded-click-through-rates-activity-7465090513348595712-xjW1", "ts_ms": 1779816273057, "ago": "3d ago", "likes": 115, "comments": 36, "shares": 11, "engagement": 162, "is_repost": false}, {"platform": "linkedin", "source": "voice", "bucket": "Lily Ray", "author": "Lily Ray", "headline": "Founder of Algorythmic | VP, SEO & AI Search at Amsive", "author_url": "https://www.linkedin.com/in/lily-ray-44755615?miniProfileUrn=urn%3Ali%3Afsd_profile%3AACoAAAMbS_cB5oBncl3cqM77vhE15wiYCxEqinE", "avatar": "https://media.licdn.com/dms/image/v2/D4E03AQHubTQsuaQJew/profile-displayphoto-shrink_800_800/profile-displayphoto-shrink_800_800/0/1667424638143?e=1781740800&v=beta&t=M3VwzHLApRKZAKHOdxbt9RA6V3UDhIN0wiJ65btGCIA", "text": "This is one of the more helpful articles I’ve seen in our space recently. It also avoids recycling the same “silver bullet” AI search tactics - like schema, FAQs, tables, long-form paragraphs, etc. - that are repeatedly framed as the new checklist for AI search optimization.\n\nSuganthan Mohanadasan does a great job of walking through the new technical considerations - including new protocols, headers, and files that make sites easier to use for agents - and whether it's even worth adding them to your site now. \n\nWorth a read & bookmark!", "url": "https://www.linkedin.com/posts/lily-ray-44755615_every-geoai-seo-post-on-my-feed-is-layer-activity-7465075988230549504-e4Qk", "ts_ms": 1779812809999, "ago": "3d ago", "likes": 137, "comments": 16, "shares": 5, "engagement": 158, "is_repost": false}, {"platform": "linkedin", "source": "voice", "bucket": "Mark Williams-Cook", "author": "Mark Williams-Cook", "headline": "Follow me for 22+ years of SEO experience, unsolicited SEO tips, AI experiments and GEO grift avoidance!", "author_url": "https://www.linkedin.com/in/markseo?miniProfileUrn=urn%3Ali%3Afsd_profile%3AACoAAADSPjwBmR-1JQLF5Fub4RzVMOMuiSNRiis", "avatar": "https://media.licdn.com/dms/image/v2/D4E03AQE_fpA6OtAwlA/profile-displayphoto-crop_800_800/B4EZ50pMOoGwAI-/0/1780073417700?e=1781740800&v=beta&t=sIUyKCPd1fRyUHgrD0Iv0Ap3uxSJDKzqqz4clrGx5S4", "text": "Do LLMs use schema? I did an experiment that was widely misunderstood, so I’ve taken the time to write up all of the detail on the theory and look at available evidence. This is the nuanced and long-form answer on my Substack. 🤓\n\nReferences to: Barry Schwartz, Gianluca Fiorelli, SEOFOMO, Ahrefs, Louise L.. \n\nLink in comments: click “Recent” and scroll if LinkedIn is being tricky.", "url": "https://www.linkedin.com/posts/markseo_do-llms-use-schema-i-did-an-experiment-that-activity-7465697975483269121-h4cL", "ts_ms": 1779961103316, "ago": "1d ago", "likes": 117, "comments": 20, "shares": 7, "engagement": 144, "is_repost": false}, {"platform": "linkedin", "source": "voice", "bucket": "Darren Shaw", "author": "Darren Shaw", "headline": "Founder of Whitespark. I share local SEO tips and strategy. Lead researcher behind the annual Local Search Ran", "author_url": "https://www.linkedin.com/in/darrenshawwhitespark?miniProfileUrn=urn%3Ali%3Afsd_profile%3AACoAAACfvt4BlTIYKNipotkJmjYVfXOkoWpMH7o", "avatar": "https://media.licdn.com/dms/image/v2/D5603AQGPRN78FYknrA/profile-displayphoto-shrink_800_800/profile-displayphoto-shrink_800_800/0/1685132735631?e=1781740800&v=beta&t=fwxWJ_WrTJpb5CXYv0R0-Htu3Rxy9JQOgYSQX8RxfXA", "text": "AI Search Is Coming for Local SEO\n\nRead more here: https://lnkd.in/gBwG8FqE", "url": "https://www.linkedin.com/posts/darrenshawwhitespark_ai-search-is-coming-for-local-seo-read-more-activity-7464752549573857280-BDjv", "ts_ms": 1779735696214, "ago": "4d ago", "likes": 111, "comments": 9, "shares": 9, "engagement": 129, "is_repost": false}, {"platform": "linkedin", "source": "voice", "bucket": "Chima Mmeje", "author": "chima mmeje🏳️‍🌈", "headline": "I build AI content workflows for SaaS companies", "author_url": "https://www.linkedin.com/in/chima-mmeje?miniProfileUrn=urn%3Ali%3Afsd_profile%3AACoAAA8GUwMBlGbJhOllDRPwgJT9o4ZwxvkfY2Q", "avatar": "https://media.licdn.com/dms/image/v2/D4E03AQH4fZVi-LwmAg/profile-displayphoto-crop_800_800/B4EZraOQF_HcAI-/0/1764597764453?e=1781740800&v=beta&t=IqehVC4S3sfMviXQHu6X_jjecb_eHV0n04tl84Se3g0", "text": "Dear Google, I'm not sure what's going on, but I think there's something wrong with your algorithm 🥹 \n\nWhen I search for MozCon, it's replaced by Amazon results.\n\nThere's clearly search volume and demand for the query. The page is properly optimized, so it's not a problem on our end.\n\nThis is one of the best SEO conferences in the industry, and it's been around for over a decade. I'm frankly shocked this is happening.\n\nJohn Mueller, can you help please?\n\nI'm getting so many messages from folks who are having trouble finding our MozCon event page\n\nIf you know someone at Google who can help us with this, please tag them on this post.\n\nLet's get MozCon back on the SERPs!", "url": "https://www.linkedin.com/posts/chima-mmeje_dear-google-im-not-sure-whats-going-on-activity-7466073295000416256-2278", "ts_ms": 1780050586462, "ago": "14h ago", "likes": 73, "comments": 40, "shares": 5, "engagement": 118, "is_repost": false}, {"platform": "linkedin", "source": "voice", "bucket": "Brodie Clark", "author": "Brodie Clark", "headline": "Independent SEO Consultant & Co-Founder @ SERP Lens | Hired by Hewlett-Packard, eBay Kleinanzeigen, Tripadviso", "author_url": "https://www.linkedin.com/in/brodieclark?miniProfileUrn=urn%3Ali%3Afsd_profile%3AACoAAA9LLXkBZJX_6unOyq8Nt3iUloHtPhJte6Y", "avatar": "https://media.licdn.com/dms/image/v2/D4E03AQEmg43NLyajtA/profile-displayphoto-crop_800_800/B4EZ0H7THFHYAM-/0/1773954480835?e=1781740800&v=beta&t=7WLzVJe56-l8z0oIKPnHPQjtGNuzM1nY5HHzZ_fRl4k", "text": "This is the biggest step Google has made so far at monetising AI Mode – sponsored ads are now being mixed with organic results.\n\nPreviously, sponsored results only had the ability to show at the end of the response, either within a carousel of sponsored products or appearing as a link card preview, as shown. \n\nThis is a change that was announced at Google Marketing Live a few days ago and covered by Barry Schwartz as the new \"Highlighted Answer Ads\", and I'm now seeing them live within AI Mode for several queries.\n\nThere is also a different type of ad called \"Coversational Discovery Ads\", which can also display within the AI Mode output, with the example shown by Google seemingly showing the ad as showing at the end of the response.\n\nThe big difference in the formatting of the ads and the free listing results that sit both above and below is that the ads go directly to the product page URL, whereas clicking the free listing results opens the standard product grid with a selection of retailers (being a less direct traffic mechanism).\n\nThis is the biggest step that Google has made so far at monetising AI Mode, because users could easily not see the subtle \"sponsored\" label and treat it as a reputable recommendation from the list of items within the output.\n\nLink in the comments to more examples of the new Highlighted Answer Ads in the wild, and make sure to subscribe to my newsletter, where I'll be giving a rundown of this change and the other impactful updates from this month.", "url": "https://www.linkedin.com/posts/brodieclark_this-is-the-biggest-step-google-has-made-activity-7464564730578292736-i3iY", "ts_ms": 1779690916676, "ago": "4d ago", "likes": 87, "comments": 24, "shares": 6, "engagement": 117, "is_repost": false}, {"platform": "linkedin", "source": "voice", "bucket": "Rand Fishkin", "author": "Rand Fishkin", "headline": "Co-author of Zero Click Marketing (preorder now!), founder of SparkToro, Alertmouse, & Snackbar Studio", "author_url": "https://www.linkedin.com/in/randfishkin?miniProfileUrn=urn%3Ali%3Afsd_profile%3AACoAAAAhO3EBD7HOVVZV7GCfFNLw-dl4PMkEK54", "avatar": "https://media.licdn.com/dms/image/v2/D5603AQHwJ2u_k15CGA/profile-displayphoto-shrink_800_800/profile-displayphoto-shrink_800_800/0/1680388120786?e=1781740800&v=beta&t=HYqSUpEawyJyIgaTdWuSbLso1iOB1k0Zks0RlFT6QbI", "text": "\"Don't make me login, export, upload, and then analyze... Just lemme connect your software to my AI tool.\"\n\nWe hear you.\n\nStarting very soon, you'll be able to do exactly that with SparkToro's new MCP and API, launching in just a few weeks. If you're interested, get on the launch list :-)", "url": "https://www.linkedin.com/posts/randfishkin_dont-make-me-login-export-upload-and-activity-7465870159719735297-_c2-", "ts_ms": 1780002155237, "ago": "1d ago", "likes": 86, "comments": 25, "shares": 3, "engagement": 114, "is_repost": false}, {"platform": "linkedin", "source": "voice", "bucket": "Aleyda Solís", "author": "Aleyda Solís", "headline": "SEO Consultant & Founder at Orainti, SEOFOMO & Co-Founder at Finchling. Sharing about SEO, AI Search, Digital ", "author_url": "https://www.linkedin.com/in/aleyda?miniProfileUrn=urn%3Ali%3Afsd_profile%3AACoAAACPygABXRKcCyQR2lZ-4yJYPptW5BXgqC8", "avatar": "https://media.licdn.com/dms/image/v2/D4D03AQHPEQZlcpVkYQ/profile-displayphoto-shrink_800_800/profile-displayphoto-shrink_800_800/0/1718713124332?e=1781740800&v=beta&t=Zt1qhMm_rLABKDEJo8XqI4gdyPNtoQUFzr3Vz1y7ado", "text": "🤖 AI Traffic vs AI Citations: What Clicks and Cited Pages Show About the AI Search Journey 👇 I analyzed April 2026 USA Semrush  data across the top sites by market share in:\n\n✈️ Travel & Tourism\n💳 Finance\n🏠 Real Estate\n🛒 Shopping/Retail\n\n40 sites in total, looking at:\n\n• Organic search traffic\n• AI traffic\n• Google AI Mode traffic\n• Pages receiving AI traffic\n• Pages cited in AI answers\n\nA few highlights: \n\n* Across the 40 sites analyzed, organic search represented ~20.45% of visits, while AI traffic represented ~0.19%.  Organic search is still the scale channel.\n\n* The pages receiving AI traffic and the pages cited in AI answers aren't often  the same:  \n\n** AI traffic tends to concentrate on:  homepages, brand-entry pages, product pages, etc. \n\n** AI citations, on the other hand, are much more distributed across: category/search/listing pages, guides and informational content,  support/policy/locator pages, product/property detail pages that help answer, validate or compare\n\n* A page can be valuable for AI visibility even if it doesn’t get AI referral traffic.\nAnd a page getting AI traffic doesn’t automatically mean it was the page helping the AI answer.\n\n* Don’t create one blended “AI search traffic” KPI and treat it as the whole story, it's a must to separate: \n\n* AI presence: Are we included in relevant answers?\n* AI citations: Which URLs are cited, surfaced or referenced?\n* AI traffic: Which URLs receive measurable clicks?\n* Page type: What role does each URL play?\n* Traffic owner: Does the click go to us, a marketplace, an OTA, a retailer or a competitor?\n* Business impact: What can be observed, proxied or modelled?\n\nFull analysis here:\nhttps://lnkd.in/er2Fbnm8", "url": "https://www.linkedin.com/posts/aleyda_ai-traffic-vs-ai-citations-what-clicks-activity-7465347600397959168-4s8B", "ts_ms": 1779877567386, "ago": "2d ago", "likes": 91, "comments": 17, "shares": 6, "engagement": 114, "is_repost": false}, {"platform": "linkedin", "source": "keyword", "bucket": "GEO", "author": "Melanie Krause", "headline": "Senior International SEO/GEO Consultant | Localization & Translation | AI Content Strategy | GTM | Germany, Sw", "author_url": "https://www.linkedin.com/in/melanie-krause?miniProfileUrn=urn%3Ali%3Afsd_profile%3AACoAABdLBqYBt6XbO1PEPcVyp8BgJ_gZ32x50FQ", "avatar": "https://media.licdn.com/dms/image/v2/D4E03AQH-KAJ5roKHnw/profile-displayphoto-crop_800_800/B4EZ1Fb9_mGcAM-/0/1774986454329?e=1781740800&v=beta&t=3axQEVeyQ27FMiXVp6Bc1OinjYl-x0t3e9X4ZinIwE8", "text": "En 2026, le SEO ne suffit plus. Il est nécessaire, mais il ne suffit plus.\nVos clients tapent encore sur Google. Mais ils demandent aussi à #ChatGPT, #Perplexity, #Gemini.\n\nEt là, votre site optimisé, vos backlinks, votre DA - ça compte beaucoup moins.\nCe qui compte ?\n\nQue des vraies personnes parlent de vous. Sur Reddit. Sur des forums. Dans des discussions authentiques que les LLMs adorent citer.\n\nReddit est aujourd’hui l’une des sources les plus utilisées par les IA génératives. Pas parce que c’est tendance. Parce que c’est considéré comme fiable, humain, non-corporate.\n\nUne marque absente de ces conversations = une marque absente des réponses IA.\nPetite parenthèse interculturelle : ce qui convainc un prospect français ne convainc pas un prospect allemand. La structure de l’argument est différente. Les preuves attendues sont différentes.\n\nCe qui rassure est différent.\nSi vous ne savez pas instinctivement pourquoi - vous avez probablement déjà perdu des deals sans comprendre pourquoi.\nLes marques qui réussissent des deux côtés du Rhin ne traduisent pas. Elles pensent dans les deux cultures.\n\nLa #GEO - Generative Engine Optimization - c’est la couche de visibilité qui vient compléter votre SEO.\n\nPas le remplacer.\nL’amplifier.\n\nDans les deux langues, dans les deux cultures, dans les deux ecosystèmes de recherche.\n\nIl se trouve que c’est exactement ce que je fais. (Entre autre, j’ai une tendance de zèbre vous l’aurez compris🤍)\n\nEt peu de personnes sont « fluent » dans les deux cultures, si proches mais pourtant si différentes, pour pouvoir jongler avec les deux à la fois. \n\nBref, \nJ’ai 2 slots disponible à partir de juin.\n\nPrestation de 1 mois renouvelable sans engagement.\n\nOn se parle ?\n\nCordi-Allemand 👀", "url": "https://www.linkedin.com/posts/melanie-krause_chatgpt-perplexity-gemini-activity-7466196164392968192-oN8y", "ts_ms": 1780079880808, "ago": "6h ago", "likes": 114, "comments": 0, "shares": 0, "engagement": 114, "is_repost": false}, {"platform": "linkedin", "source": "voice", "bucket": "Glenn Gabe", "author": "Glenn Gabe", "headline": "President of G-Squared Interactive LLC", "author_url": "https://www.linkedin.com/in/glenngabe?miniProfileUrn=urn%3Ali%3Afsd_profile%3AACoAAAFUiYUBc529kqRUB0OhVrQtWpoW9jiP2eQ", "avatar": "https://media.licdn.com/dms/image/v2/D4E03AQHlph8yA_nSEw/profile-displayphoto-crop_800_800/B4EZe7T6gpHwAI-/0/1751194249555?e=1781740800&v=beta&t=o69_Zgw0YTA1X9pEVcO_6mK1eN1ndzxfXjM2Fciz7-8", "text": "Big news and sort of proves Google *is* trying to drive more clicks to publishers. Preferred sources is coming to AIOs and AI Mode (which we've seen in testing). And then there's a new carousel that can show up when Google thinks users want to dig deeper on a developing topic. And there's a similar carousel for discussions, forums, and social media. Check out the details and screenshots in Barry Schwartz's post.  \n\nhttps://lnkd.in/dgWrhD_J", "url": "https://www.linkedin.com/posts/glenngabe_big-news-and-sort-of-proves-google-is-trying-activity-7465449235505881088-1_0j", "ts_ms": 1779901799084, "ago": "2d ago", "likes": 99, "comments": 4, "shares": 9, "engagement": 112, "is_repost": false}, {"platform": "linkedin", "source": "voice", "bucket": "Chima Mmeje", "author": "Christopher Iwundu", "headline": "SEO, AEO, GEO & Content Marketing for Tech and B2B SaaS companies | Content Marketer | Content Strategist | Co", "author_url": "https://www.linkedin.com/in/positiveequator?miniProfileUrn=urn%3Ali%3Afsd_profile%3AACoAACQ7HsABTuWZM37bMRXhkBvPQZFudJByUXs", "avatar": "https://media.licdn.com/dms/image/v2/D4D03AQFel-_roCe9ug/profile-displayphoto-shrink_800_800/profile-displayphoto-shrink_800_800/0/1727687753526?e=1781740800&v=beta&t=T5aDZE1Y1DTw6LBUbgOzkqAbge7xOHlTF7FMuw6Xv08", "text": "I'm happy to announce that I've been matched to be mentored by Roxana Stingu, in The FCDC mentorship program.\n\nRecently, I was thinking about every SEO and content engagement I've been on over the past few years. I noticed a clear pattern.\n\nThe projects that moved fastest were the ones where the technical foundation was already solid. That is why I decided to deepen my knowledge of Technical SEO this June.\n\n... and I'm super honored to be learning under Roxana's mentorship.\n\nRoxana is the Head of Search and SEO at Alamy, has over 15 years of industry experience, and is an international speaker and educator.\n\nI want to thank The FCDC, chima, and Johnson for this rare opportunity, and Roxana for this generous gift of your time. It means a lot to me. 🙏 \n\nCan't wait to get started! 💪 \n\n#positiveequator #TechnicalSEO #SEO #mentorship", "url": "https://www.linkedin.com/posts/positiveequator_positiveequator-technicalseo-seo-activity-7465442957370851328-ij-p", "ts_ms": 1779900550053, "ago": "2d ago", "likes": 90, "comments": 20, "shares": 2, "engagement": 112, "is_repost": false}, {"platform": "linkedin", "source": "voice", "bucket": "Aleyda Solís", "author": "Aleyda Solís", "headline": "SEO Consultant & Founder at Orainti, SEOFOMO & Co-Founder at Finchling. Sharing about SEO, AI Search, Digital ", "author_url": "https://www.linkedin.com/in/aleyda?miniProfileUrn=urn%3Ali%3Afsd_profile%3AACoAAACPygABXRKcCyQR2lZ-4yJYPptW5BXgqC8", "avatar": "https://media.licdn.com/dms/image/v2/D4D03AQHPEQZlcpVkYQ/profile-displayphoto-shrink_800_800/profile-displayphoto-shrink_800_800/0/1718713124332?e=1781740800&v=beta&t=Zt1qhMm_rLABKDEJo8XqI4gdyPNtoQUFzr3Vz1y7ado", "text": "🚨 Announcing: The #SEOFOMO Global Search Community Giveaway: The Road to 50K Challe uthor": "Darren Shaw", "headline": "Founder of Whitespark. I share local SEO tips and strategy. Lead researcher behind the annual Local Search Ran", "author_url": "https://www.linkedin.com/in/darrenshawwhitespark?miniProfileUrn=urn%3Ali%3Afsd_profile%3AACoAAACfvt4BlTIYKNipotkJmjYVfXOkoWpMH7o", "avatar": "https://media.licdn.com/dms/image/v2/D5603AQGPRN78FYknrA/profile-displayphoto-shrink_800_800/profile-displayphoto-shrink_800_800/0/1685132735631?e=1781740800&v=beta&t=fwxWJ_WrTJpb5CXYv0R0-Htu3Rxy9JQOgYSQX8RxfXA", "text": "10 Ways to Get AI to Recommend Your Business\n\nRead more here: https://lnkd.in/gFNFnEkx", "url": "https://www.linkedin.com/posts/darrenshawwhitespark_10-ways-to-get-ai-to-recommend-your-business-activity-7465476940934717440-64pu", "ts_ms": 1779908404573, "ago": "2d ago", "likes": 93, "comments": 6, "shares": 8, "engagement": 107, "is_repost": false}, {"platform": "linkedin", "source": "voice", "bucket": "Mark Williams-Cook", "author": "Mark Williams-Cook", "headline": "Follow me for 22+ years of SEO experience, unsolicited SEO tips, AI experiments and GEO grift avoidance!", "author_url": "https://www.linkedin.com/in/markseo?miniProfileUrn=urn%3Ali%3Afsd_profile%3AACoAAADSPjwBmR-1JQLF5Fub4RzVMOMuiSNRiis", "avatar": "https://media.licdn.com/dms/image/v2/D4E03AQE_fpA6OtAwlA/profile-displayphoto-crop_800_800/B4EZ50pMOoGwAI-/0/1780073417700?e=1781740800&v=beta&t=sIUyKCPd1fRyUHgrD0Iv0Ap3uxSJDKzqqz4clrGx5S4", "text": "Unsolicited #SEO tip: \"Build your brand\" can seem vague in SEO, but the Google exploit we found demonstrated one way Google does this with a metric they call site_quality_score ⤵️ \n\nSite quality score has wide-reaching implications for the visibility of your site and is used in multiple places. Google calculates you a site quality score like this:\n\nSQS = (queries that name your site) / (all clicks to your site)\n\nIn other words: out of everyone who lands on your site from Google, what proportion specifically searched for you?\n\nIf lots of people type \"candour seo\" or \"candour seo agency\" and then click on our result, that's a strong signal that humans actively want us; our brand, not just that you happened to rank for something generic. \n\nThe patent explicitly counts brand mentions, known nicknames for your site, and navigational queries as the numerator.\n\nWe also discovered thresholds you had to hit to be eligible for features such as rich snippets, featured results, and increasingly AI Overviews. \n\nThe uncomfortable truth is this: you can win every on-page content audit, every Core Web Vital, every schema validator… and still be locked out of rich results because real humans aren't asking for your brand.\n\n*mspaint.exe for your learning pleasure", "url": "https://www.linkedin.com/posts/markseo_seo-activity-7466099516413292544-Pv2t", "ts_ms": 1780056838134, "ago": "12h ago", "likes": 72, "comments": 30, "shares": 5, "engagement": 107, "is_repost": false}, {"platform": "x", "source": "voice", "bucket": "Rand Fishkin", "author": "Rand Fishkin (follow @randderuiter on Threads)", "headline": "@randfish", "author_url": "https://x.com/randfish", "avatar": "https://pbs.twimg.com/profile_images/1642291634066030593/byujxuux_normal.jpg", "text": "For anyone who thinks the Zero Click Web is inevitable... It's not. Big tech platforms decide whether to give traffic. Judge accordingly", "url": "https://x.com/randfish/status/2059015298746110259", "ts_ms": 1779742476000, "ago": "4d ago", "likes": 87, "comments": 8, "shares": 12, "engagement": 107, "is_repost": false}, {"platform": "linkedin", "source": "voice", "bucket": "Aleyda Solís", "author": "Aleyda Solís", "headline": "SEO Consultant & Founder at Orainti, SEOFOMO & Co-Founder at Finchling. Sharing about SEO, AI Search, Digital ", "author_url": "https://www.linkedin.com/in/aleyda?miniProfileUrn=urn%3Ali%3Afsd_profile%3AACoAAACPygABXRKcCyQR2lZ-4yJYPptW5BXgqC8", "avatar": "https://media.licdn.com/dms/image/v2/D4D03AQHPEQZlcpVkYQ/profile-displayphoto-shrink_800_800/profile-displayphoto-shrink_800_800/0/1718713124332?e=1781740800&v=beta&t=Zt1qhMm_rLABKDEJo8XqI4gdyPNtoQUFzr3Vz1y7ado", "text": "Let’s wish a very happy birthday to the amazing Silvia Martin Palacio, not only an excellent SEO consultant, but now also author of the SEO for Branding book (you need to buy it, link in comments) and one of the kindest people and best friends I have in the industry 🥳💜⭐️ Hope you’ve enjoyed of a lovely celebration day! 🎉😎🙌", "url": "https://www.linkedin.com/posts/aleyda_lets-wish-a-very-happy-birthday-to-the-amazing-activity-7465464635727532034-PaKj", "ts_ms": 1779905470783, "ago": "2d ago", "likes": 74, "comments": 30, "shares": 1, "engagement": 105, "is_repost": false}, {"platform": "linkedin", "source": "voice", "bucket": "Koray Tuğberk Gübür", "author": "Yuriy Veliyev", "headline": "Link acquisition for SEO agencies, SaaS & brands | Growing Visihunt", "author_url": "https://www.linkedin.com/in/yuriy-veliyev?miniProfileUrn=urn%3Ali%3Afsd_profile%3AACoAACR61XoB33uBTR_I3EHa17gJn49u7GE-BYU", "avatar": "https://media.licdn.com/dms/image/v2/D4D03AQEVbN043B7PnA/profile-displayphoto-shrink_800_800/B4DZWa1dfJG4Ak-/0/1742059461090?e=1781740800&v=beta&t=7ZwIKWHng5GDADaO4ZTgfXhHYn-bVaoH3rxIkMHDRvI", "text": "#SEOVibes Summit '26 was absolutely worth the trip.\n\nGreat conversations, brilliant people, and more than a few debates about where search is heading 😁\n\nConferences like this are a fantastic reminder that a 10-minute in-person conversation can cut through more than weeks of back-and-forth over Slack or Google Meet.\n\nMet a lot of agency owners, founders, and SEO specialists I’d previously only known through LinkedIn posts, X threads, or industry discussions. That part never really gets old.\n\nThanks to everyone who made time to talk, especially:\nKoray Tugberk GUBUR, Jabez Reuben, Stephen Burns, Robert Niechciał, Kalin Karakehayov, Faustas Nazarovas, Germans Frolovs, Olesia Korobka, Néstor Vázquez, Hristo Bogdanov, Marten Saar, Nicola La Serra.\n\nHuge credit as well to Tomasz Domanski and the entire WhitePress® team for putting together an event that genuinely brought the SEO community together in the best possible way.\n\nSee you at the next one!", "url": "https://www.linkedin.com/posts/yuriy-veliyev_seovibes-ugcPost-7464622715749142528-G06i", "ts_ms": 1779715779602, "ago": "4d ago", "likes": 88, "comments": 9, "shares": 1, "engagement": 98, "is_repost": false}, {"platform": "linkedin", "source": "voice", "bucket": "Chima Mmeje", "author": "chima mmeje🏳️‍🌈", "headline": "I build AI content workflows for SaaS companies", "author_url": "https://www.linkedin.com/in/chima-mmeje?miniProfileUrn=urn%3Ali%3Afsd_profile%3AACoAAA8GUwMBlGbJhOllDRPwgJT9o4ZwxvkfY2Q", "avatar": "https://media.licdn.com/dms/image/v2/D4E03AQH4fZVi-LwmAg/profile-displayphoto-crop_800_800/B4EZraOQF_HcAI-/0/1764597764453?e=1781740800&v=beta&t=IqehVC4S3sfMviXQHu6X_jjecb_eHV0n04tl84Se3g0", "text": "May has been a brutal month for layoffs in tech, and I've seen so many good folks turning on their open to work banner.\n\nIf you work in the SEO industry and are looking for guidance to improve your resume, we just published research on the Moz blog that should offer useful tips.\n\nMassive shoutout to Josh Peacock and his team for providing the data we used in the study.\n\nThe data that tells you the words hiring managers are using when looking for SEO and content candidates to hire.\n\nA few takeaways:\n\nDon't overstuff your resume with keywords, but look for ways to include the ones where your skills align\nBack each claim with numbers that show outcome\nHiring managers are willing to pay more for SEO specialists with AI search skills\nThe basics still matter and probably always will (measurement, tech SEO, authority signals, etc.)", "url": "https://www.linkedin.com/posts/chima-mmeje_may-has-been-a-brutal-month-for-layoffs-in-activity-7465728964846645248-yIJQ", "ts_ms": 1779968491756, "ago": "1d ago", "likes": 74, "comments": 13, "shares": 10, "engagement": 97, "is_repost": false}, {"platform": "linkedin", "source": "voice", "bucket": "Cyrus Shepard", "author": "Cyrus S.", "headline": "Follow for tips on SEO + AI Growth | Former Head of Global SEO at Moz / Amazon Consultant | Founder, Zyppy Mar", "author_url": "https://www.linkedin.com/in/cyrusshepard?miniProfileUrn=urn%3Ali%3Afsd_profile%3AACoAAAM5ul8B6qayPCFVxvQF349bHXVQfxmn6ho", "avatar": "https://media.licdn.com/dms/image/v2/D5603AQEJ_n8voG2Fpw/profile-displayphoto-shrink_800_800/B56Z4tu9_uJkAY-/0/1778883748057?e=1781740800&v=beta&t=16uQSTAQKrleY907kAuAsncRaF4K66NzWWZqOKuqKak", "text": "How to leverage \"lastLongestClicks\" for better Google rankings\n\nGoogle uses many user-interaction signals in its ranking algorithms, as we've learned through patents, trial evidence, and API leaks. \n\nhttps://lnkd.in/gH3Sy_zD\n\nGoogle measures what search results users click on, how long they stay on a webpage, and perhaps most importantly, what page led to a satisfying answer (by ending the search journey).\n\nlastLongestClicks, from the API docs, appears to be one of those important measurements. \n\n- It's the page that finally gives users their answer.\n- It's the page that gives information nobody else is talking about.\n- It's the page that users seek out again and again.\n- It's the page users trust. \n\nThe biggest shift is to stop thinking about the keyword and solve for the user journey.\n\nA person Googling \"movie showtimes\" wants more than movie showtimes. They want reviews, cast information, theater information, tickets, and ultimately, to buy a movie ticket.\n\nYour job is to answer the keyword while also finding out what the user really wants.\n\nIf they have to go back to Google to complete this journey, you've lost.\n\nThe ideal page:\n\n1) Shows the user they are in the right place\n2) Answer the main keyword completely\n3) Answers obvious and non-obvious follow-up questions\n4) Is better than every other top result in at least one or two undeniable ways\n5) Saves the user from clicking back to Google by moving the user further along their ultimate journey\n\nShift your thinking. Happy optimizing.", "url": "https://www.linkedin.com/posts/cyrusshepard_optimize-for-lastlongestclicks-in-google-activity-7465440659781574657-BHvt", "ts_ms": 1779899754472, "ago": "2d ago", "likes": 68, "comments": 19, "shares": 7, "engagement": 94, "is_repost": false}, {"platform": "linkedin", "source": "voice", "bucket": "Areej AbuAli", "author": "Areej AbuAli", "headline": "Founder of Women in Tech SEO | Author & Speaker | Building a global community that drives growth for brands", "author_url": "https://www.linkedin.com/in/areejabuali?miniProfileUrn=urn%3Ali%3Afsd_profile%3AACoAAAWt2xcBDsmratOB38HOOBzdshShGJOzW6A", "avatar": "https://media.licdn.com/dms/image/v2/D4D03AQGMutbElLJZPA/profile-displayphoto-shrink_800_800/B4DZYpHYNNHwAg-/0/1744446522776?e=1781740800&v=beta&t=dIuxOUtw-2PQGqpKFJXL6O9NZGrYFO-mHLHRyT2zfPU", "text": "My favourite Women in Tech SEO partner renewal email reply ever!\n\nThank YOU Nick Lafferty & thank you team Profound\n\nHere's to our second year working together 💙", "url": "https://www.linkedin.com/posts/areejabuali_my-favourite-women-in-tech-seo-partner-renewal-activity-7466108995955789824-gjnI", "ts_ms": 1780059098233, "ago": "11h ago", "likes": 81, "comments": 13, "shares": 0, "engagement": 94, "is_repost": false}, {"platform": "linkedin", "source": "voice", "bucket": "Carrie Rose", "author": "Carrie Rose", "headline": "CEO & Founder of Rise at Seven - UK & USA 🇺🇸", "author_url": "https://www.linkedin.com/in/carrieroseballoch?miniProfileUrn=urn%3Ali%3Afsd_profile%3AACoAAAl0C40Bx1XZ00XYqnt9ORytcqN_DGsBa5M", "avatar": "https://media.licdn.com/dms/image/v2/D4E03AQGjyxESbr4pmA/profile-displayphoto-shrink_800_800/B4EZdfuMeiHgAg-/0/1749657636165?e=1781740800&v=beta&t=L29vSjxXiYN0lgC2eGykHXfJwU2kuMtJnzATkb1XtPw", "text": "WHOS LEADING THE CATEGORY FOR UK STAYCATIONS? 🏠 ⛱️ 🪣 \n\nOver 300 categories have been added to the leaderboard since we launched it with AHREFS, 3 weeks ago and as summer approaches... \n\nWe're entering TRAVEL SEASON...\n\nHere's how the UK staycation category is looking mid way through the UK school holidays (and 33 degree heatwave)...\n\nAway Resorts sits in # 3rd place with VERY strong google visibility but brand demand holding them back\n\nSykes Cottages sits just outside top 3 at # 4, with strong AI visibility in comparison to competitors but a bit of work needed on Google to kick Away Resorts out\n\nCenter Parcs sits at #14, not even in the top 10 falling behind in Google visibility\n\nTHIS IS THE MOST INTERESTING ONE - Haven have a HUGE OPP with Google visibility. Theyre higher for brand demand that Hoseasons, AND more visible in AI than Hoseasons but their google visibility is holding them back from being the true category leader\n\nYou cant be a category leader if you're not the most found (on google and AI) or most in demand (brand demand) \n\nUK staycation market is very competitive, we spent 6 years getting Parkdean Resorts to be a serious player in this space with both SEO and creative content campaigns\n\nSee where you sit as a category leader in the UK staycation category (link in comments)", "url": "https://www.linkedin.com/posts/carrieroseballoch_whos-leading-the-category-for-uk-staycations-activity-7465318215032717312-Cb0U", "ts_ms": 1779870561369, "ago": "2d ago", "likes": 82, "comments": 10, "shares": 1, "engagement": 93, "is_repost": false}, {"platform": "linkedin", "source": "voice", "bucket": "Aleyda Solís", "author": "Aleyda Solís", "headline": "SEO Consultant & Founder at Orainti, SEOFOMO & Co-Founder at Finchling. Sharing about SEO, AI Search, Digital ", "author_url": "https://www.linkedin.com/in/aleyda?miniProfileUrn=urn%3Ali%3Afsd_profile%3AACoAAACPygABXRKcCyQR2lZ-4yJYPptW5BXgqC8", "avatar": "https://media.licdn.com/dms/image/v2/D4D03AQHPEQZlcpVkYQ/profile-displayphoto-shrink_800_800/profile-displayphoto-shrink_800_800/0/1718713124332?e=1781740800&v=beta&t=Zt1qhMm_rLABKDEJo8XqI4gdyPNtoQUFzr3Vz1y7ado", "text": "🚨 Ya solo quedan casi solo 2 semanas para el primer #MujeresEnSEO Summit en Barcelona 💪\n\nNos vemos el sábado 13 de junio, por la mañana, en Barcelona en una jornada especial dedicada al SEO, la búsqueda y la IA, con ponencias y mesas de grandes mujeres profesionales del sector: \n\n⭐️ MJ Cachón Yáñez\n⭐️ Estela Franco\n⭐️ Clara Soteras Acosta\n⭐️ Aina-Lluna Taylor Barceló\n⭐️ Jade Johnson Virgili\n⭐️ Valen Correa\n⭐️ Ciara Serrano Temprado\n⭐️ Eva Olivares Busquets\n⭐️ Natalia Witczyk\n⭐️ Jo Juliana Turnbull\n... y servidora! \n\nAunque el evento nace desde Mujeres en SEO, estará también abierto a personas de todos los géneros. La idea es crear un espacio cercano, útil y diverso para aprender, compartir experiencias, ofrecer ideas y apoyo 🙌😎\n\nAdemás, la entrada tiene un coste simbólico de sólo 16,54 €, que incluye una mañana de charlas, networking, bebidas y snacks!\n\nQuiero agradecer a nuestros grandes patrocinadores, verdaderos aliados sin los cuales el evento no sería posible: \n\n⭐️ Marfeel\n⭐️ Screaming Frog\n⭐️ Raiola Networks\n⭐️  bigmomo\n⭐️  SEOTesting\n⭐️  Women in Tech SEO\n⭐️  Grupo Billingham\n⭐️  Laika\n⭐️  #SEOFOMO \n\nSi estás en Barcelona, trabajas en SEO, marketing digital, contenidos, producto, analítica o simplemente quieres entender mejor hacia dónde va la búsqueda, me encantará verte allí.\n\n👉 Regístrate aquí: https://lnkd.in/eKHhWZA7", "url": "https://www.linkedin.com/posts/aleyda_mujeresenseo-seofomo-activity-7465688413552222208-_1P3", "ts_ms": 1779958823574, "ago": "1d ago", "likes": 72, "comments": 10, "shares": 7, "engagement": 89, "is_repost": false}, {"platform": "linkedin", "source": "voice", "bucket": "Areej AbuAli", "author": "Celeste Gonzalez", "headline": "Product @ Lastmile Retail | Speaker | Wix Course Creator | Your Fav SEO", "author_url": "https://www.linkedin.com/in/celestelili?miniProfileUrn=urn%3Ali%3Afsd_profile%3AACoAAClAe5EBGFwFriJ3kpRucamL9tedgSm7B78", "avatar": "https://media.licdn.com/dms/image/v2/D5603AQGMNhO9gRdf-Q/profile-displayphoto-crop_800_800/B56ZngnoY4IsAI-/0/1760410110670?e=1781740800&v=beta&t=Y0HGDc4mN-yLpe5_jQDltEreLccDywwp_lmhSlIfkfY", "text": "7 years of Women in Tech SEO ! i can’t say enough how grateful i was for this community to exist when i joined SEO. i was a lurker and Areej AbuAli did not let me stay that way for long! i remember when she reached out to me to do a WTS Interview and i was so honored that i could do one. \n\nthe first wts philadelphia was my first conference ever and i was hooked ever since. i was able to meet Crystal Carter, Krystal Taing, and Tory Gray in person and had so much fun with the conference after party dancing. \n\nWTSEO gave me my first yes to speaking at a conference too! i’ve gained so much from this community and have been grateful to mentor and volunteer at the last WTS Portland. \n\nalways appreciative of everything this community have given me and thankful for the connections i’ve been able to make \n\n(like Ana De La Cruz, Samantha Torres, and Catherine M Kim 🩷)", "url": "https://www.linkedin.com/posts/celestelili_7-years-of-women-in-tech-seo-i-cant-say-ugcPost-7466125594779381760-cRVW", "ts_ms": 1780063220364, "ago": "10h ago", "likes": 81, "comments": 5, "shares": 1, "engagement": 87, "is_repost": false}, {"platform": "linkedin", "source": "voice", "bucket": "Fery Kaszoni", "author": "Fery Kaszoni", "headline": "SEO case studies - Digital PR case studies", "author_url": "https://www.linkedin.com/in/ferenczkaszoni?miniProfileUrn=urn%3Ali%3Afsd_profile%3AACoAABBP5V4BwVGlR4pJgWivMRUNOAy1qQFPlPI", "avatar": "https://media.licdn.com/dms/image/v2/D4E03AQG1GqYfAbqPfQ/profile-displayphoto-crop_800_800/B4EZpLprgRIoAI-/0/1762205809023?e=1781740800&v=beta&t=FXVkHrWvb3cPWSb2cRGDYPj0d76AYEa2q5ou0UxSCX0", "text": "Anthropic just launched their latest model, Opus 4.8. \n\nI've been consuming millions of tokens per hour in the past weeks with Opus 4.7 and that model is a beast.\n\nLooking forward to testing the new 4.8, it will be a long night 🔥", "url": "https://www.linkedin.com/posts/ferenczkaszoni_anthropic-just-launched-their-latest-model-activity-7465813255450521600-9cAi", "ts_ms": 1779988588202, "ago": "1d ago", "likes": 67, "comments": 18, "shares": 0, "engagement": 85, "is_repost": false}, {"platform": "linkedin", "source": "voice", "bucket": "Fery Kaszoni", "author": "Fery Kaszoni", "headline": "SEO case studies - Digital PR case studies", "author_url": "https://www.linkedin.com/in/ferenczkaszoni?miniProfileUrn=urn%3Ali%3Afsd_profile%3AACoAABBP5V4BwVGlR4pJgWivMRUNOAy1qQFPlPI", "avatar": "https://media.licdn.com/dms/image/v2/D4E03AQG1GqYfAbqPfQ/profile-displayphoto-crop_800_800/B4EZpLprgRIoAI-/0/1762205809023?e=1781740800&v=beta&t=FXVkHrWvb3cPWSb2cRGDYPj0d76AYEa2q5ou0UxSCX0", "text": "Away with my daughters and wife to the Isle of Wight for a bank holiday recharge.\n\nHere are the things I talk about with my 10 year old twins when on holiday:\n\n- Claude Code \n\n- Full Self Driving\n\n- AI advancements\n\n- Marketing\n\n- Business\n\n- Video editing\n\n- Football\n\n- How to climb trees\n\nThe best part is that they love it and their brain is like a sponge.\n\nOne of them said she wishes AI would not evolve beyond this point as people could end up losing purpose.That’s a 10 year old child’s concern 🤷‍♂️\n\nBack to my desk tomorrow morning, but until then, I’m off for some tech talk with my girls.", "url": "https://www.linkedin.com/posts/ferenczkaszoni_away-with-my-daughters-and-wife-to-the-isle-activity-7464631090385670145-RB7C", "ts_ms": 1779706738087, "ago": "4d ago", "likes": 70, "comments": 14, "shares": 0, "engagement": 84, "is_repost": false}, {"platform": "linkedin", "source": "voice", "bucket": "Kevin Indig", "author": "Kevin Indig", "headline": "Growth Advisor", "author_url": "https://www.linkedin.com/in/kevinindig?miniProfileUrn=urn%3Ali%3Afsd_profile%3AACoAABIhMjcBq8NMgIfgfa69D2M0o-aAH9WT6ZQ", "avatar": "https://media.licdn.com/dms/image/v2/D4E03AQH0W3jJfrJmjg/profile-displayphoto-shrink_800_800/B4EZOTOTj8HkAg-/0/1733341823286?e=1781740800&v=beta&t=PUV9pPGWyIu5dMohiptTZXMOYNtbNOAZqdlfspgeXZw", "text": "Saying AEO and SEO are the same misses the point.\n\nSearch rank still drives a lot of AI visibility, and most of the tactics overlap. But AEO is a different game.\n\nSame between SEO and AEO:\n1. Technical accessibility: machines need to crawl, render, parse, and understand your content.\n2. Clear information architecture: pages, entities, topics, and relationships need to be easy to map.\n3. Content quality: thin, vague, generic content performs poorly in both systems.\n4. Authority signals: credible sources, expert content, links, mentions, and citations still matter.\n5. User intent matching: content needs to answer what people are actually trying to solve.\n\nNew in AEO:\n1. Rank matters after inclusion: in shortlists, first still wins. In narrative answers, mention quality matters.\n2. Mentions can rival links: reviews, comparisons, forums, articles, and docs can shape the answer.\n3. Prompts are harder to track: they’re roughly 5x longer than keywords and harder to target page by page.\n4. Positioning becomes machine-interpreted: AI infers your category, competitors, use cases, and buyer fit from the broader web.\n5. Reputation gets compressed: owned content, third-party coverage, reviews, and consensus collapse into one answer.\n\nThat’s where HubSpot AEO comes in: it shows how your brand appears across AI search engines like ChatGPT, Gemini, and Perplexity, and gives marketers a way to improve visibility without treating AEO as a replacement for SEO.\n\nStart your free 28-day trial: https://lnkd.in/dDihj4bE\n\n\n#Ad #HubSpotMediaPartner", "url": "https://www.linkedin.com/posts/kevinindig_ad-hubspotmediapartner-activity-7465031776005144576-wa2z", "ts_ms": 1779802268983, "ago": "3d ago", "likes": 60, "comments": 19, "shares": 4, "engagement": 83, "is_repost": false}, {"platform": "x", "source": "keyword", "bucket": "SEO", "author": "Unknown", "headline": "", "author_url": "https://x.com/neilpatel", "avatar": "", "text": "Your website ranking #1 doesn't mean AI cites you. Most AI-generated answers pull from Reddit threads, YouTube reviews, forums, and third-party mentions, not your blog. Your site is the floor now. Being mentioned everywhere else is the ceiling.\n\n#AISearch #SEO #DigitalMarketing #NeilPatel #SearchEverywhere", "url": "https://x.com/neilpatel/status/2060118995345260898", "ts_ms": 1780005618000, "ago": "1d ago", "likes": 49, "comments": 15, "shares": 18, "engagement": 82, "is_repost": false}, {"platform": "linkedin", "source": "voice", "bucket": "Mark Williams-Cook", "author": "Mark Williams-Cook", "headline": "Follow me for 22+ years of SEO experience, unsolicited SEO tips, AI experiments and GEO grift avoidance!", "author_url": "https://www.linkedin.com/in/markseo?miniProfileUrn=urn%3Ali%3Afsd_profile%3AACoAAADSPjwBmR-1JQLF5Fub4RzVMOMuiSNRiis", "avatar": "https://media.licdn.com/dms/image/v2/D4E03AQE_fpA6OtAwlA/profile-displayphoto-crop_800_800/B4EZ50pMOoGwAI-/0/1780073417700?e=1781740800&v=beta&t=sIUyKCPd1fRyUHgrD0Iv0Ap3uxSJDKzqqz4clrGx5S4", "text": "Ahh, the few weeks after brightonSEO; when LinkedIn decides NOW is the optimal time to show everyone's posts from the event 🤡", "url": "https://www.linkedin.com/posts/markseo_ahh-the-few-weeks-after-brightonseo-when-activity-7466077761653297153-AiDP", "ts_ms": 1780051651395, "ago": "13h ago", "likes": 63, "comments": 15, "shares": 0, "engagement": 78, "is_repost": false}, {"platform": "linkedin", "source": "voice", "bucket": "Mark Williams-Cook", "author": "Mark Williams-Cook", "headline": "Follow me for 22+ years of SEO experience, unsolicited SEO tips, AI experiments and GEO grift avoidance!", "author_url": "https://www.linkedin.com/in/markseo?miniProfileUrn=urn%3Ali%3Afsd_profile%3AACoAAADSPjwBmR-1JQLF5Fub4RzVMOMuiSNRiis", "avatar": "https://media.licdn.com/dms/image/v2/D4E03AQE_fpA6OtAwlA/profile-displayphoto-crop_800_800/B4EZ50pMOoGwAI-/0/1780073417700?e=1781740800&v=beta&t=sIUyKCPd1fRyUHgrD0Iv0Ap3uxSJDKzqqz4clrGx5S4", "text": "If you run an agency, this post by Bengü is a must read. It talks about how to approach people moving from 'execution' into 'strategy' roles, what that entails, how to achieve it and the traps.\n\nThis really resonated with me, as over the years I have tried to coax people out of 'problem solving' mindset into the 'are these the right problems?' kind of thinking.\n\nI imagine it's also a great read if you're working on the execution side either in-house or agency and you're thinking about how to take that step into strategy.\n\nLink in comments, if LinkedIn is playing the 'hide the valuable link' game, then click \"Recent\" and just scroll to the bottom and you shall find. ⬇️⬇️", "url": "https://www.linkedin.com/posts/markseo_if-you-run-an-agency-this-post-by-beng%C3%BC-activity-7466080906894589953-aBu_", "ts_ms": 1780052401279, "ago": "13h ago", "likes": 67, "comments": 8, "shares": 2, "engagement": 77, "is_repost": false}, {"platform": "linkedin", "source": "voice", "bucket": "Kevin Indig", "author": "Kevin Indig", "headline": "Growth Advisor", "author_url": "https://www.linkedin.com/in/kevinindig?miniProfileUrn=urn%3Ali%3Afsd_profile%3AACoAABIhMjcBq8NMgIfgfa69D2M0o-aAH9WT6ZQ", "avatar": "https://media.licdn.com/dms/image/v2/D4E03AQH0W3jJfrJmjg/profile-displayphoto-shrink_800_800/B4EZOTOTj8HkAg-/0/1733341823286?e=1781740800&v=beta&t=PUV9pPGWyIu5dMohiptTZXMOYNtbNOAZqdlfspgeXZw", "text": "We've gotten a feel for how users behave inside AI Mode. They accept the shortlist, pick the top result, and click nothing else.\n\nWhat I keep wondering is whether the same user behaves the same way when an AI Overview shows up inside a normal Google SERP. Same person, different surface. Does the acceptance carry over?\n\nI dug into a new clickstream study of 846k US Google sessions from Feb and March 2026 to find out. Short version: the behavior reverses. The user who accepts in AI Mode starts comparing, back-scrolling, and re-reading the moment an AIO lands on a regular SERP. The meta description and title tag are doing more work than they have in 18 months.\n\nDrops Tuesday (not tomorrow, because of Memorial Day).", "url": "https://www.linkedin.com/posts/kevinindig_weve-gotten-a-feel-for-how-users-behave-activity-7464203585866817537-AsNn", "ts_ms": 1779604813067, "ago": "5d ago", "likes": 61, "comments": 15, "shares": 0, "engagement": 76, "is_repost": false}, {"platform": "linkedin", "source": "voice", "bucket": "Koray Tuğberk Gübür", "author": "Koray Tugberk GUBUR", "headline": "CEO and Founder of Holistic SEO & Digital - Fortune 500 SEO and Business Consultant - Topical Authority - Vent", "author_url": "https://www.linkedin.com/in/koray-tugberk-gubur?miniProfileUrn=urn%3Ali%3Afsd_profile%3AACoAABMCp4YBUnkh_U5WEi0yaVvtfSyvYiGywSA", "avatar": "https://media.licdn.com/dms/image/v2/D4D03AQHnu3z8HxJY1g/profile-displayphoto-shrink_800_800/profile-displayphoto-shrink_800_800/0/1703783588185?e=1781740800&v=beta&t=xvYYOj_up5nngAzGf7VA2oaYwrRuShbkB8KwmPrRHAA", "text": "I just returned yesterday and I am slowly getting back to my regular routine. I will answer all pending emails and messages today.\n\nThat said, it was truly a wonderful event. Thank you for capturing this memory. It was a pleasure to meet you and discuss the current state of SEO while also reflecting on the future together.\n\nSEO Vibes Zakopane 2026 was an amazing family reunion for me.\n\nPhoto: Saulius Petrauskas (many thanks for taking it.)\n#seo #seovibes", "url": "https://www.linkedin.com/posts/koray-tugberk-gubur_seo-seovibes-activity-7464621176888385536-8OXa", "ts_ms": 1779704374525, "ago": "4d ago", "likes": 67, "comments": 7, "shares": 1, "engagement": 75, "is_repost": false}, {"platform": "linkedin", "source": "voice", "bucket": "Darren Sh
